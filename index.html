/* ============================================================
   DATE + DOMAIN HELPERS
   ============================================================ */
function isoDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseISO(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function todayStr() { return isoDate(new Date()); }
function dayName(s) { return parseISO(s).toLocaleDateString("en-GB",{weekday:"long"}); }
function prettyDate(s) { return parseISO(s).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}); }
function shortDate(s) { return parseISO(s).toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function daysBetween(aStr, bStr) {
  const a = parseISO(aStr), b = parseISO(bStr);
  return Math.round((b - a) / 86400000);
}
function mondayOf(s) {
  const d = parseISO(s); const wd = (d.getDay() + 6) % 7; // Mon=0
  d.setDate(d.getDate() - wd); return isoDate(d);
}
function lastTradingDayOfMonth(year, monthIdx) { // monthIdx 0-based
  let d = new Date(year, monthIdx + 1, 0); // last calendar day
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}

function weekTypeFor(dateStr, calendar) {
  for (const p of calendar) {
    if (dateStr >= p.start && dateStr <= p.end) return { type: p.type, note: p.note };
  }
  return { type: "LOW", note: "No scheduled work period — treated as baseline." };
}
function weeklyTargets(type) {

  if (type === "MEDIUM") return { volume: 1820, protein: 1050 };
  return { volume: 2800, protein: 1180 };
}
function pctOfBaseline(type) { return type==="HIGH"?40 : type==="MEDIUM"?65 : 100; }

/* next-fire computation for a milestone, from a reference date string */
function getNextFire(m, fromStr) {
  const from = parseISO(fromStr);
  const cmp = (dStr) => dStr; // dates compare lexicographically when ISO

  if (m.type === "date") return m.trigger;

  if (m.type === "recurring_monthly" && m.trigger === "last_trading_day_of_month") {
    const months = m.months || [];
    for (const ym of months) {
      const [y, mo] = ym.split("-").map(Number);
      const d = isoDate(lastTradingDayOfMonth(y, mo - 1));
      if (cmp(d) >= fromStr) return d;
    }
    // all tranches in the past: fall back to the last configured one
    if (months.length) { const [y, mo] = months[months.length-1].split("-").map(Number); return isoDate(lastTradingDayOfMonth(y, mo - 1)); }
    return m.next_fire || fromStr;
  }
  if (m.type === "recurring_monthly" && m.trigger === "1st_of_month") {
    const months = m.months || [];
    for (const ym of months) {
      const d = ym + "-01";
      if (cmp(d) >= fromStr) return d;
    }
    if (months.length) return months[months.length-1] + "-01";
    return m.next_fire || fromStr;
  }
  // recurring_quarterly + anything else: use stored next_fire
  return m.next_fire || m.trigger || fromStr;
}

/* effective next fire respecting a snooze stored on the milestone */
function effectiveFire(m, fromStr) {
  const base = getNextFire(m, fromStr);
  if (m.snooze_until && m.snooze_until > base) return m.snooze_until;
  return base;
}

/* ============================================================
   COACH MESSAGE — static rules, evaluated in order (Module 3)
   ============================================================ */
function coachMessage(ctx) {
  const { type, energy, waterHit, estrodot, workoutLogged, hour } = ctx;
  if (estrodot && energy <= 2)
    return "Low energy is expected during the Estrodot adjustment window. This is physiological, not motivational.";
  if (type === "HIGH" && !workoutLogged && hour > 17)
    return "HIGH week. One 15-minute session counts as a session. Don't compare this week's volume to a LOW week.";
  if (type === "HIGH" && workoutLogged)
    return "Session logged in a HIGH week. That's the adjusted target met. Frozen meals cover protein for the rest of the week.";
  if (!waterHit && hour > 14)
    return "3L minimum not yet hit. Dehydration amplifies fatigue — physiology, not willpower.";
  if (type === "LOW" && workoutLogged)
    return "LOW week with a session logged. This is the catch-up window — use it.";
  if (type === "MEDIUM" && energy <= 2)
    return "Energy at 2 on a MEDIUM week. One shorter session is the realistic target. Life volume counts.";
  if (type === "LOW" && energy >= 4 && !workoutLogged)
    return "Energy available, LOW week. This is the week to push volume.";
  return "Log energy and water to get a read on today.";
}

/* empty daily log, with defaults pre-filled for the given week type */
function emptyLog(date, type) {
  return {
    date,
    energy: type === "HIGH" ? 2 : type === "MEDIUM" ? 3 : 4,
    water_hit: false,
    elvanse_taken: true,
    estrodot_on: true,
    sunlight: "",
    workout: { exercises: [], life_volume: [], total_kg: 0 },
    diet: { protein_estimate_g: 0, friction_hit: false, friction_type: null },
    work: { stress_felt: type === "HIGH" ? 4 : type === "MEDIUM" ? 3 : 2, note: "" }
  };
}
function logVolume(log) {
  if (!log || !log.workout) return 0;
  const w = (log.workout.exercises || []).reduce((s,e)=> s + (e.volume_kg||0), 0);
  const l = (log.workout.life_volume || []).reduce((s,e)=> s + (e.volume_kg||0), 0);
  return w + l;
}
function hasWorkout(log) {
  return !!log && !!log.workout && (log.workout.exercises || []).some(e => (e.reps||0) > 0);
}

/* ============================================================
   SEED ON FIRST LAUNCH
   ============================================================ */
function seedIfNeeded() {
  if (store.get("gc_seeded")) return;
  if (!store.get("gc_settings")) store.set("gc_settings", DEFAULT_SETTINGS);
  SEED_LOGS.forEach(l => store.set("log_" + l.date, l));
  DEFAULT_MILESTONES.forEach(m => store.set("milestone_" + m.id, m));
  store.set("gc_seeded", true);
}

function loadAllLogs() {
  const out = {};
  store.keys().filter(k => k.startsWith("log_")).forEach(k => {
    const l = store.get(k); if (l && l.date) out[l.date] = l;
  });
  return out;
}
function loadMilestones() {
  return store.keys().filter(k => k.startsWith("milestone_")).map(k => store.get(k)).filter(Boolean);
}
function loadAlertLogs() {
  return store.keys().filter(k => k.startsWith("alert_log_")).map(k => store.get(k)).filter(Boolean)
    .sort((a,b)=> (b.timestamp||"").localeCompare(a.timestamp||""));
}

/* ============================================================
   SMALL UI PRIMITIVES
   ============================================================ */
function ProgressBar({ label, value, target, unit, color, done }) {
  const pct = done != null ? (done ? 100 : 0) : Math.min(100, target > 0 ? (value / target) * 100 : 0);
  const c = color || "var(--low)";
  return (
    <div className="bar-wrap">
      <div className="bar-head">
        <span>{label}</span>
        <span className="mono muted">
          {done != null ? (done ? "hit" : "not hit") : `${Math.round(value)}${unit||""} / ${Math.round(target)}${unit||""}`}
        </span>
      </div>
      <div className="bar-track"><div className="bar-fill" style={{ width: pct + "%", background: c }} /></div>
    </div>
  );
}

function Segment({ options, value, onChange, variant }) {
  return (
    <div className="seg">
      {options.map(o => {
        const on = String(value) === String(o.value);
        return (
          <button key={String(o.value)} className={on ? `on ${variant||""}` : ""}
            onClick={() => onChange(o.value)}>{o.label}</button>
        );
      })}
    </div>
  );
}
const yesNo = [{label:"YES",value:true},{label:"NO",value:false}];
const energyOpts = [1,2,3,4,5].map(n => ({label:String(n),value:n}));

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch (e) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); return true;
    } catch (e2) { return false; }
  }
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [tab, setTab] = useState("today");
  const [settings, setSettings] = useState(() => store.get("gc_settings", DEFAULT_SETTINGS));
  const [logs, setLogs] = useState(() => loadAllLogs());
  const [milestones, setMilestones] = useState(() => loadMilestones());
  const [alertLogs, setAlertLogs] = useState(() => loadAlertLogs());
  const [alertOpen, setAlertOpen] = useState(null); // {milestone, auto}
  const [showIntro, setShowIntro] = useState(() => !store.get("gc_settings", DEFAULT_SETTINGS).notifAsked);
  const today = todayStr();
  const week = weekTypeFor(today, settings.stressCalendar);
  const timers = useRef([]);

  const activeColor = week.type === "HIGH" ? "var(--high)" : week.type === "MEDIUM" ? "var(--medium)" : "var(--low)";

  /* persistence helpers shared with tabs */
  const saveSettings = useCallback((next) => { setSettings(next); store.set("gc_settings", next); }, []);
  const saveLog = useCallback((log) => {
    store.set("log_" + log.date, log);
    setLogs(prev => ({ ...prev, [log.date]: log }));
  }, []);
  const saveMilestone = useCallback((m) => {
    store.set("milestone_" + m.id, m);
    setMilestones(loadMilestones());
  }, []);
  const deleteMilestone = useCallback((id) => {
    store.del("milestone_" + id); setMilestones(loadMilestones());
  }, []);
  const recordAlert = useCallback((rec) => {
    store.set(`alert_log_${rec.id}_${Date.now()}`, rec);
    setAlertLogs(loadAlertLogs());
  }, []);

  const todayLog = logs[today] || emptyLog(today, week.type);

  /* ---- service worker registration + notification deep-link wiring ---- */
  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(()=>{});
      navigator.serviceWorker.addEventListener("message", (ev) => {
        if (ev.data && ev.data.type === "NOTIFICATION_CLICK") {
          const m = loadMilestones().find(x => x.id === ev.data.id);
          if (m) { setTab("alerts"); setAlertOpen({ milestone: m }); }
        }
      });
    }
    // deep-link from a cold open: /?alert=<id>
    const params = new URLSearchParams(location.search);
    const aid = params.get("alert");
    if (aid) {
      const m = loadMilestones().find(x => x.id === aid);
      if (m) { setTab("alerts"); setAlertOpen({ milestone: m }); }
      history.replaceState({}, "", location.pathname);
    }
  }, []);

  /* ---- client-side scheduling: re-arm timers on open (Module 1) ----
     LIMITATION: setTimeout only fires while the PWA is open/backgrounded.
     True closed-app push needs a backend (phase 2). We recalculate every open. */
  useEffect(() => {
    timers.current.forEach(t => clearTimeout(t));
    timers.current = [];
    const now = Date.now();
    const MAX = 24 * 24 * 3600 * 1000; // setTimeout safe ceiling (~24 days)
    milestones.forEach(m => {
      const fire = effectiveFire(m, today);
      if (!fire) return;
      const fireMs = parseISO(fire).getTime() + 9 * 3600 * 1000; // 09:00 local
      const delay = fireMs - now;
      if (delay > 0 && delay < MAX) {
        const t = setTimeout(() => {
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: "SHOW_NOTIFICATION",
              payload: { id: m.id, project: m.project, title: m.name, body: m.action.slice(0, 120) }
            });
          }
          setAlertOpen({ milestone: m, auto: true });
        }, delay);
        timers.current.push(t);
      }
    });
    return () => { timers.current.forEach(t => clearTimeout(t)); };
  }, [milestones, today]);

  /* upcoming milestones sorted by next fire */
  const upcoming = useMemo(() => {
    return milestones
      .map(m => ({ m, fire: effectiveFire(m, today), days: daysBetween(today, effectiveFire(m, today)) }))
      .sort((a,b) => a.fire.localeCompare(b.fire));
  }, [milestones, today]);

  const nextAlert = upcoming.find(u => u.days >= 0) || upcoming[0];
  const pending7 = upcoming.filter(u => u.days >= 0 && u.days <= 7).length;

  /* ---- notification permission flow ---- */
  const requestPerms = async () => {
    let perm = "default";
    try { if ("Notification" in window) perm = await Notification.requestPermission(); }
    catch (e) { perm = "default"; }
    saveSettings({ ...settings, notifPermission: perm, notifAsked: true });
    setShowIntro(false);
  };
  const dismissIntro = () => { saveSettings({ ...settings, notifAsked: true }); setShowIntro(false); };

  const ctxBundle = { settings, week, today, logs, milestones, alertLogs, saveSettings, saveLog, saveMilestone, deleteMilestone, recordAlert, setTab, setAlertOpen };

  return (
    <div className="app" style={{ "--active": activeColor }}>
      <div className="content">
        {showIntro && (
          <IntroCard onEnable={requestPerms} onSkip={dismissIntro} />
        )}
        {!showIntro && settings.notifPermission === "denied" && (
          <div className="banner warn">Notifications off — trading alerts won't fire. Enable in browser settings.</div>
        )}

        {tab === "today" &&    <TodayTab {...ctxBundle} todayLog={todayLog} nextAlert={nextAlert} />}
        {tab === "alerts" &&   <AlertsTab {...ctxBundle} upcoming={upcoming} />}
        {tab === "log" &&      <LogTab {...ctxBundle} todayLog={todayLog} />}
        {tab === "patterns" && <PatternsTab {...ctxBundle} />}
        {tab === "settings" && <SettingsTab {...ctxBundle} setLogs={setLogs} setMilestones={setMilestones} setAlertLogs={setAlertLogs} />}
      </div>

      <Nav tab={tab} setTab={setTab} pending7={pending7} />

      {alertOpen && (
        <AlertScreen
          milestone={alertOpen.milestone}
          settings={settings}
          recordAlert={recordAlert}
          saveMilestone={saveMilestone}
          onClose={() => setAlertOpen(null)}
        />
      )}
    </div>
  );
}

    <div className="card">
      <h2>Ground Control</h2>
      <p className="small muted mt8">Notifications fire time-critical trading and check-in alerts so you don't have to hold the dates in your head.</p>
      <div className="row mt12" style={{gap:10}}>

/* Full-screen alert action card + Drive write-back */
function AlertScreen({ milestone: m, settings, recordAlert, saveMilestone, onClose }) {
  const [mode, setMode] = useState("card"); // card | confirm | dismiss | drive
  const [note, setNote] = useState("");
  const [reason, setReason] = useState("");
  const [response, setResponse] = useState(null);
  const [copied, setCopied] = useState(false);

  const buildMarkdown = (resp, text) => {
    const now = new Date();
    return `## Ground Control Log — ${m.name}\n` +
      `**Date:** ${isoDate(now)}\n` +
      `**Response:** ${resp}\n` +
      `**Action taken:** ${text || "confirmed as per action description"}\n` +
      `**Timestamp:** ${now.toISOString()}\n`;
  };

  const doConfirm = () => {
    const text = note.trim() || "confirmed as per action description";
    recordAlert({ id:m.id, name:m.name, project:m.project, response:"Confirmed", note:text, timestamp:new Date().toISOString() });
    setResponse("Confirmed");
    setMode("drive");
  };
  const doDismiss = () => {
    recordAlert({ id:m.id, name:m.name, project:m.project, response:"Dismissed", note:reason.trim()||"not applicable", timestamp:new Date().toISOString() });
    setResponse("Dismissed");
    setMode("drive");
  };
  const doSnooze = () => {
    const d = new Date(); d.setDate(d.getDate()+1);
    saveMilestone({ ...m, snooze_until: isoDate(d) });
    onClose();
  };

  const markdown = response ? buildMarkdown(response, response==="Confirmed" ? note.trim() : reason.trim()) : "";

  return (
    <div className="overlay">
      <div className="row between" style={{padding:"14px 16px",borderBottom:"1px solid var(--border)"}}>
        <span className="badge project">{m.project}</span>
        <button className="ghost sm" onClick={onClose}>Close</button>
      </div>
      <div className="ov-body">
        {mode === "card" && (
          <div>
            <h1 style={{fontSize:22,lineHeight:1.25}}>{m.name}</h1>
            <h3 className="mt12">Action required</h3>
            <p className="mt8">{m.action}</p>
            {m.context && (
              <div className="banner info mt12">{m.context}</div>
            )}
            <div className="col mt12" style={{gap:10}}>
              <button className="primary block" onClick={()=>setMode("confirm")}>✓ Confirm — action taken</button>
              <button className="block" onClick={doSnooze}>⏰ Snooze 24h</button>
              <button className="danger block" onClick={()=>setMode("dismiss")}>✗ Dismiss — not applicable</button>
            </div>
          </div>
        )}

        {mode === "confirm" && (
          <div>
            <h2>Log this action</h2>
            <label className="field mt12">Note (optional)
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="What did you do? Leave blank to log as per the action description." />
            </label>
            <button className="primary block mt12" onClick={doConfirm}>Save and prepare Drive entry</button>
            <button className="ghost block mt8" onClick={()=>setMode("card")}>Back</button>
          </div>
        )}

        {mode === "dismiss" && (
          <div>
            <h2>Dismiss — reason</h2>
            <label className="field mt12">Reason
              <textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="Why is this not applicable?" />
            </label>
            <button className="danger block mt12" onClick={doDismiss}>Log as dismissed</button>
            <button className="ghost block mt8" onClick={()=>setMode("card")}>Back</button>
          </div>
        )}

        {mode === "drive" && (
          <div>
            <h2>Write to Drive</h2>
            <p className="small muted mt8">Copy this to your portfolio dashboard. Direct Drive write (OAuth) lands in phase 2.</p>
            <div className="codebox mt12">{markdown}</div>
            <button className="primary block mt12" onClick={async()=>{ const ok = await copyText(markdown); setCopied(ok); }}>
              {copied ? "Copied" : "Copy log entry"}
            </button>
            <button className="block mt8" onClick={()=>window.open("https://drive.google.com","_blank")}>Open Drive</button>
            <button className="ghost block mt8" onClick={onClose}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

function LogTab({ settings, week, today, todayLog, saveLog, saveSettings, setTab }) {
  const map = settings.volumeMap;
  const baseNames = ["Deadlifts","OH Press","Squats","Push-ups","KB Swings"];

  // Initialise editable draft from the saved day.
  const initExercises = () => {
    const saved = todayLog.workout?.exercises || [];
    const rows = baseNames.map(n => {
      const f = saved.find(e => e.name === n);
      return { name: n, reps: f ? String(f.reps) : "" };
    });
    saved.filter(e => !baseNames.includes(e.name)).forEach(e => rows.push({ name:e.name, reps:String(e.reps) }));
    return rows;
  };
  const [rows, setRows] = useState(initExercises);
  const [life, setLife] = useState(() => (todayLog.workout?.life_volume || []).map(l => ({...l})));
  const [bw, setBw] = useState(settings.bodyWeight);
  const [editBw, setEditBw] = useState(false);
  const [protein, setProtein] = useState(todayLog.diet?.protein_estimate_g ? String(todayLog.diet.protein_estimate_g) : "");
  const [friction, setFriction] = useState(!!todayLog.diet?.friction_hit);
  const [frictionType, setFrictionType] = useState(todayLog.diet?.friction_type || "");
  const [energy, setEnergy] = useState(todayLog.energy);
  const [water, setWater] = useState(todayLog.water_hit);
  const [elvanse, setElvanse] = useState(todayLog.elvanse_taken);
  const [estrodot, setEstrodot] = useState(todayLog.estrodot_on);
  const [sunlight, setSunlight] = useState(todayLog.sunlight || "");
  const [stress, setStress] = useState(todayLog.work?.stress_felt || 3);
  const [notes, setNotes] = useState(todayLog.work?.note || "");

  // custom exercise / life inputs
  const [newExName, setNewExName] = useState("");
  const [newExReps, setNewExReps] = useState("");

  const repVol = (name, reps) => Math.round((Number(reps)||0) * perRep(name));
  const workoutTotal = rows.reduce((s,r)=> s + repVol(r.name, r.reps), 0);
  const lifeTotal = life.reduce((s,l)=> s + (l.volume_kg||0), 0);
  const combined = workoutTotal + lifeTotal;

  const setReps = (i, v) => setRows(rows.map((r,idx)=> idx===i?{...r,reps:v.replace(/[^0-9]/g,"")}:r));
  const addCustomEx = () => {
    if (!newExName.trim()) return;
    setRows([...rows, { name:newExName.trim(), reps:newExReps.replace(/[^0-9]/g,"") }]);
    setNewExName(""); setNewExReps("");
  };
  const addLife = (name, kg, reps) => {
    const w = Number(kg)||0, r = Number(reps)||1;
    setLife([...life, { name, weight_kg:w, reps:r, volume_kg: Math.round(w*r) }]);
  };
  const presets = [
    {name:"Vacuum", kg:7.5, reps:1, fixed:true},
    {name:"Groceries", kg:15, reps:1, ask:true},
    {name:"Kid 20kg", kg:20, reps:1, fixed:true},
    {name:"Kid 34kg", kg:34, reps:1, fixed:true},
    {name:"Stairs carry", kg:10, reps:1, ask:true}
  ];

  const saveDay = () => {
    const exercises = rows.filter(r => (Number(r.reps)||0) > 0)
      .map(r => ({ name:r.name, reps:Number(r.reps), volume_kg: repVol(r.name, r.reps) }));
    const total = exercises.reduce((s,e)=>s+e.volume_kg,0) + lifeTotal;
    const log = {
      date: today,
      energy, water_hit: water, elvanse_taken: elvanse, estrodot_on: estrodot, sunlight,
      workout: { exercises, life_volume: life, total_kg: total },
      diet: { protein_estimate_g: Number(protein)||0, friction_hit: friction, friction_type: friction ? (frictionType||null) : null },
      work: { stress_felt: stress, note: notes }
    };
    saveLog(log);
    if (Number(bw) && Number(bw) !== settings.bodyWeight) saveSettings({ ...settings, bodyWeight: Number(bw) });
    setTab("today");
  };

  return (
    <div>
      <h1 className="mb8">Log — {shortDate(today)}</h1>

      {/* Workout */}
      <div className="card">
        <div className="row between">
          <h3>Workout</h3>
          <button className="sm ghost" onClick={()=>setEditBw(!editBw)}>
            {editBw ? "done" : `${bw}kg ✏`}
          </button>
        </div>
        {editBw && (
          <div className="row mt8" style={{gap:8}}>
            <input inputMode="numeric" value={bw} onChange={e=>setBw(e.target.value.replace(/[^0-9.]/g,""))} />
            <button className="sm" onClick={()=>setEditBw(false)}>Set</button>
          </div>
        )}
        <div className="col mt12" style={{gap:10}}>
          {rows.map((r,i)=>(
            <div key={i} className="ex-row">
              <span className="small">{r.name}</span>
              <input inputMode="numeric" placeholder="reps" value={r.reps} onChange={e=>setReps(i, e.target.value)} />
              <span className="vol mono">{repVol(r.name, r.reps)}kg</span>
            </div>
          ))}
        </div>
        <hr className="divider" />
        <div className="row" style={{gap:8}}>
          <input className="grow" placeholder="exercise name" value={newExName} onChange={e=>setNewExName(e.target.value)} />
          <input style={{width:80}} inputMode="numeric" placeholder="reps" value={newExReps} onChange={e=>setNewExReps(e.target.value.replace(/[^0-9]/g,""))} />
          <button className="sm" onClick={addCustomEx}>Add</button>
        </div>
        <div className="row between mt12">
          <span className="muted small">Workout sub-total</span>
          <span className="mono" style={{fontWeight:700}}>{workoutTotal}kg</span>
        </div>
      </div>

      {/* Life volume */}
      <div className="card">
        <h3>Life volume</h3>
        <div className="preset-grid mt12">
          {presets.map(p=>(
            <button key={p.name} className="sm" onClick={()=>{
              if (p.ask) {
                const v = prompt(`${p.name} — weight in kg`, String(p.kg));
                if (v != null) addLife(p.name, v, 1);
              } else addLife(p.name, p.kg, p.reps);
            }}>{p.name}</button>
          ))}
        </div>
        <div className="row mt12" style={{gap:6}}>
          <input className="grow" placeholder="name" value={lifeCustom.name} onChange={e=>setLifeCustom({...lifeCustom,name:e.target.value})} />
          <input style={{width:62}} inputMode="numeric" placeholder="kg" value={lifeCustom.kg} onChange={e=>setLifeCustom({...lifeCustom,kg:e.target.value.replace(/[^0-9.]/g,"")})} />
          <input style={{width:52}} inputMode="numeric" placeholder="×" value={lifeCustom.reps} onChange={e=>setLifeCustom({...lifeCustom,reps:e.target.value.replace(/[^0-9]/g,"")})} />
          <button className="sm" onClick={()=>{ if(lifeCustom.name.trim()&&lifeCustom.kg){ addLife(lifeCustom.name.trim(), lifeCustom.kg, lifeCustom.reps||1); setLifeCustom({name:"",kg:"",reps:"1"});} }}>Add</button>
        </div>
        {life.length>0 && (
          <div className="col mt12" style={{gap:6}}>
            {life.map((l,i)=>(
              <div key={i} className="row between small">
                <span>{l.name} <span className="muted">({l.weight_kg}kg × {l.reps})</span></span>
                <span className="row" style={{gap:8}}>
                  <span className="mono" style={{color:"var(--blue)"}}>{l.volume_kg}kg</span>
                  <button className="sm ghost" style={{minHeight:28,padding:"0 8px"}} onClick={()=>setLife(life.filter((_,idx)=>idx!==i))}>✗</button>
                </span>
              </div>
            ))}
          </div>
        )}
        <div className="row between mt12">
          <span className="muted small">Life sub-total</span>
          <span className="mono" style={{fontWeight:700,color:"var(--blue)"}}>{lifeTotal}kg</span>
        </div>
        <hr className="divider" />
        <div className="row between">
          <span style={{fontWeight:600}}>Combined total</span>
          <span className="mono" style={{fontWeight:800,fontSize:18}}>{combined}kg</span>
        </div>
      </div>

      {/* Diet */}
      <div className="card">
        <h3>Diet check-in</h3>
        <label className="field mt12">Protein estimate
          <input inputMode="numeric" placeholder="grams — rough estimate is fine" value={protein} onChange={e=>setProtein(e.target.value.replace(/[^0-9]/g,""))} />
        </label>
        <div className="mt12">
          <div className="small muted mb8">Friction today?</div>
          <Segment options={yesNo} value={friction} variant={friction?"no":"yes"} onChange={setFriction} />
        </div>
        {friction && (
          <div className="row wrap mt12" style={{gap:6}}>
            {FRICTION_TYPES.map(f=>(
              <button key={f} className={"sm " + (frictionType===f?"":"ghost")} style={frictionType===f?{background:"var(--amber)",color:"#1a1300",borderColor:"var(--amber)"}:{}} onClick={()=>setFrictionType(f)}>{f}</button>
            ))}
          </div>
        )}
      </div>

      {/* Daily context */}
      <div className="card">
        <h3>Daily context</h3>
        <div className="col mt12" style={{gap:14}}>
          <div><div className="small muted mb8">Energy</div><Segment options={energyOpts} value={energy} variant="energy" onChange={setEnergy} /></div>
          <div><div className="small muted mb8">Water {settings.waterDaily}L</div><Segment options={yesNo} value={water} variant={water?"yes":"no"} onChange={setWater} /></div>
          <div className="row" style={{gap:10}}>
            <div className="grow"><div className="small muted mb8">Elvanse</div><Segment options={yesNo} value={elvanse} variant="health" onChange={setElvanse} /></div>
            <div className="grow"><div className="small muted mb8">Estrodot</div><Segment options={yesNo} value={estrodot} variant="health" onChange={setEstrodot} /></div>
          </div>
          <div><div className="small muted mb8">Sunlight</div>
            <Segment options={[{label:"Outdoors",value:"outdoors"},{label:"Mostly indoors",value:"indoors"}]} value={sunlight} onChange={setSunlight} />
          </div>
          <div><div className="small muted mb8">Work stress felt</div><Segment options={energyOpts} value={stress} onChange={setStress} /></div>
          <label className="field">Notes

      <button className="primary block" style={{position:"sticky",bottom:"calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px)"}} onClick={saveDay}>Save day</button>
    </div>
  );
}

/* ============================================================
   PATTERNS TAB (Module 5)
   ============================================================ */
function PatternsTab({ settings, logs, today }) {
  const allLogs = Object.values(logs).sort((a,b)=>a.date.localeCompare(b.date));
  const cal = settings.stressCalendar;

  // group by ISO week (Monday key)
  const weeks = useMemo(() => {
    const groups = {};
    allLogs.forEach(l => {
      const k = mondayOf(l.date);
      (groups[k] = groups[k] || []).push(l);
    });
    return Object.entries(groups).map(([k, items]) => {
      const type = weekTypeFor(k, cal).type;
      const tgt = weeklyTargets(type);
      const volume = items.reduce((s,l)=>s+logVolume(l),0);
      const protein = items.reduce((s,l)=>s+(l.diet?.protein_estimate_g||0),0);
      const frictions = items.filter(l=>l.diet?.friction_hit).length;
      const energy = items.reduce((s,l)=>s+(l.energy||0),0)/items.length;
      const water = items.filter(l=>l.water_hit).length;
      const vsTarget = tgt.volume>0 ? (volume/tgt.volume)*100 : 0;
      return { key:k, type, volume, protein, frictions, energy, water, days:items.length, vsTarget, tgt };
    }).sort((a,b)=>b.key.localeCompare(a.key));
  }, [allLogs, cal]);

  // this month summary
  const month = today.slice(0,7);
  const monthLogs = allLogs.filter(l => l.date.slice(0,7) === month);
  const mVol = monthLogs.reduce((s,l)=>s+logVolume(l),0);
  const mSessions = monthLogs.filter(l=>hasWorkout(l)).length;
  const monthWeeks = weeks.filter(w => w.key.slice(0,7) === month || monthLogs.some(l=>mondayOf(l.date)===w.key));
  const mProteinWeekAvg = monthWeeks.length ? Math.round(monthWeeks.reduce((s,w)=>s+w.protein,0)/monthWeeks.length) : 0;
  const mFriction = monthLogs.filter(l=>l.diet?.friction_hit).length;
  const mWater = monthLogs.filter(l=>l.water_hit).length;
  const mEnergy = monthLogs.length ? (monthLogs.reduce((s,l)=>s+(l.energy||0),0)/monthLogs.length) : 0;

  // correlations (4+ weeks)
  const enoughData = weeks.length >= 4;
  let corr = null;
  if (enoughData) {
    const highWeeks = weeks.filter(w=>w.type==="HIGH");
    const highAvg = highWeeks.length ? Math.round(highWeeks.reduce((s,w)=>s+w.vsTarget,0)/highWeeks.length) : 0;
    const fricW = weeks.filter(w=>w.frictions>0), cleanW = weeks.filter(w=>w.frictions===0);
    const fricVol = fricW.length ? fricW.reduce((s,w)=>s+w.vsTarget,0)/fricW.length : 0;
    const cleanVol = cleanW.length ? cleanW.reduce((s,w)=>s+w.vsTarget,0)/cleanW.length : 0;
    const diff = cleanVol>0 ? Math.round((1 - fricVol/cleanVol)*100) : 0;
    const waterDays = allLogs.filter(l=>l.water_hit), noWaterDays = allLogs.filter(l=>!l.water_hit);
    const wE = waterDays.length ? (waterDays.reduce((s,l)=>s+l.energy,0)/waterDays.length).toFixed(1) : "—";
    const nE = noWaterDays.length ? (noWaterDays.reduce((s,l)=>s+l.energy,0)/noWaterDays.length).toFixed(1) : "—";
    const estDays = allLogs.filter(l=>l.estrodot_on), estLow = estDays.filter(l=>l.energy<=2);
    const estPct = estDays.length ? Math.round((estLow.length/estDays.length)*100) : 0;
    corr = { highAvg, diff, wE, nE, estPct };
  }

  // weekly summary markdown (latest week)
  const summaryMd = useMemo(() => {
    if (!weeks.length) return "";
    const w = weeks[0];
    const note = weekTypeFor(w.key, cal).note;
    const frTypes = allLogs.filter(l=>mondayOf(l.date)===w.key && l.diet?.friction_hit).map(l=>l.diet.friction_type).filter(Boolean);
    const notesTxt = allLogs.filter(l=>mondayOf(l.date)===w.key && l.work?.note).map(l=>l.work.note).join("; ");
    return `## Ground Control — Week of ${shortDate(w.key)}\n` +
      `Work: ${w.type} — ${note}\n` +
      `Volume: ${Math.round(w.volume)}kg (${Math.round(w.vsTarget)}% of ${w.type} target)\n` +
      `Protein: ${w.protein}g / ${w.tgt.protein}g target\n` +
      `Friction: ${frTypes.length ? frTypes.join(", ") : "none"}\n` +
      `Energy avg: ${w.energy.toFixed(1)}/5\n` +
      `Water: ${w.water}/${w.days} days\n` +
      `Notes: ${notesTxt || "none"}\n`;
  }, [weeks, allLogs, cal]);

  const [copyMsg, setCopyMsg] = useState("");

  const rowClass = (pct) => pct>=90 ? "r-green" : pct>=60 ? "r-amber" : "r-red";

  return (
    <div>
      <h1 className="mb8">Patterns</h1>

      <div className="card">
        <h3>This month</h3>
        <div className="row wrap mt12" style={{gap:8}}>
          <span className="pill"><span className="lab">Volume</span> {Math.round(mVol)}kg</span>
          <span className="pill"><span className="lab">Sessions</span> {mSessions}</span>
          <span className="pill"><span className="lab">Protein/wk</span> {mProteinWeekAvg}g</span>
          <span className="pill"><span className="lab">Friction</span> {mFriction}</span>
          <span className="pill"><span className="lab">Water</span> {mWater}/{monthLogs.length}d</span>
          <span className="pill"><span className="lab">Energy</span> {mEnergy.toFixed(1)}/5</span>
        </div>
      </div>

      <div className="card">
        <h3>Week by week</h3>
        {weeks.length === 0 && <p className="muted small mt8">No data yet.</p>}
        {weeks.length > 0 && (
          <table className="weeks mt8">
            <thead><tr>
              <th>Week</th><th>Type</th><th>Vol</th><th>vs%</th><th>Prot</th><th>Fr</th><th>En</th>
            </tr></thead>
            <tbody>
              {weeks.map(w=>(
                <tr key={w.key} className={rowClass(w.vsTarget)}>
                  <td>{shortDate(w.key)}</td>
                  <td>{w.type[0]}</td>
                  <td className="num">{Math.round(w.volume)}</td>
                  <td className="num">{Math.round(w.vsTarget)}%</td>
                  <td className="num">{w.protein}</td>
                  <td className="num">{w.frictions}</td>
                  <td className="num">{w.energy.toFixed(1)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      <div className="card">
        <h3>Correlations</h3>
        {!enoughData && <p className="muted small mt8">Patterns appear after 4 weeks of logging. Keep going.</p>}
        {enoughData && corr && (
          <div className="col mt8 small" style={{gap:8}}>
            <p>HIGH weeks averaged {corr.highAvg}% of volume target.</p>
            <p>Weeks with diet friction: {corr.diff}% lower volume than friction-free weeks.</p>
            <p>Days water was hit: avg energy {corr.wE}/5. Days it wasn't: {corr.nE}/5.</p>
            <p>Estrodot on + energy ≤ 2: {corr.estPct}% of Estrodot days.</p>
          </div>
        )}
      </div>

      <div className="card">
        <h3>Export</h3>
        <div className="col mt12">
          <button className="block" onClick={async()=>{ const ok = await copyText(JSON.stringify(allLogs,null,2)); setCopyMsg(ok?"Data copied as JSON":"Copy failed"); }}>Copy data as JSON</button>
          <button className="block" onClick={async()=>{ const ok = await copyText(summaryMd); setCopyMsg(ok?"Weekly summary copied":"Copy failed"); }}>Copy weekly summary</button>
          {copyMsg && <p className="tiny muted">{copyMsg}</p>}
        </div>
        {summaryMd && <div className="codebox mt12">{summaryMd}</div>}
      </div>
    </div>
  );
}

/* ============================================================

function SettingsTab({ settings, saveSettings, milestones, saveMilestone, deleteMilestone, today, setLogs, setMilestones, setAlertLogs }) {

  const [protein, setProtein] = useState(String(settings.proteinWeekly));

  const [delConfirm, setDelConfirm] = useState("");
  const [msg, setMsg] = useState("");

  const saveNumbers = () => {
    saveSettings({ ...settings, bodyWeight:Number(bw)||66, proteinWeekly:Number(protein)||1180, waterDaily:Number(water)||3 });
    setMsg("Saved");
    setTimeout(()=>setMsg(""),1500);
  };

  // volume map editing
  const [mapState, setMapState] = useState({...settings.volumeMap});
  const [newMapName, setNewMapName] = useState(""); const [newMapVal, setNewMapVal] = useState("");
  const saveMap = (next) => { setMapState(next); saveSettings({ ...settings, volumeMap: next }); };

  // calendar editing
  const cal = settings.stressCalendar;
  const updateCal = (next) => saveSettings({ ...settings, stressCalendar: next });

  const [newPeriod, setNewPeriod] = useState({start:"",end:"",type:"MEDIUM",note:""});

  // milestone editing (lightweight)
  const [editM, setEditM] = useState(null);

  const exportAll = async () => {
    const dump = {
      gc_settings: settings,
      logs: store.keys().filter(k=>k.startsWith("log_")).reduce((o,k)=>{o[k]=store.get(k);return o;},{}),
      milestones: milestones,
      alert_logs: store.keys().filter(k=>k.startsWith("alert_log_")).reduce((o,k)=>{o[k]=store.get(k);return o;},{})
    };
    const ok = await copyText(JSON.stringify(dump,null,2));
    setMsg(ok?"All data copied":"Copy failed"); setTimeout(()=>setMsg(""),1500);
  };
  const importAll = () => {
    try {
      const d = JSON.parse(importTxt);
      if (d.gc_settings) store.set("gc_settings", d.gc_settings);
      if (d.logs) Object.entries(d.logs).forEach(([k,v])=>store.set(k,v));
      if (d.milestones) d.milestones.forEach(m=>store.set("milestone_"+m.id, m));
      if (d.alert_logs) Object.entries(d.alert_logs).forEach(([k,v])=>store.set(k,v));
      store.set("gc_seeded", true);
      setMsg("Imported — reloading"); setTimeout(()=>location.reload(),700);
    } catch (e) { setMsg("Invalid JSON"); setTimeout(()=>setMsg(""),2000); }
  };
  const clearAll = () => {
    if (delConfirm !== "DELETE") return;
    store.keys().forEach(k => { if (k.startsWith("log_")||k.startsWith("milestone_")||k.startsWith("alert_log_")||k==="gc_settings"||k==="gc_seeded"||k==="push_subscription") store.del(k); });
    location.reload();
  };

  return (

      <div className="card">
        <h3>Targets</h3>
        <div className="col mt12">

          <label className="field">Weekly protein target (g)
            <input inputMode="numeric" value={protein} onChange={e=>setProtein(e.target.value.replace(/[^0-9]/g,""))} />
          </label>
          <label className="field">Water daily target (L)
            <input inputMode="numeric" value={water} onChange={e=>setWater(e.target.value.replace(/[^0-9.]/g,""))} />
          </label>
          <button className="primary block" onClick={saveNumbers}>Save targets</button>
        </div>
      </div>

      <div className="card">
        <h3>Exercise volume map (kg/rep)</h3>
        <div className="col mt12" style={{gap:8}}>
          {Object.entries(mapState).map(([name,val])=>(
            <div key={name} className="row between">
              <span className="small">{name}</span>
              <span className="row" style={{gap:6}}>
                <input style={{width:70}} inputMode="numeric" value={val} onChange={e=>saveMap({...mapState,[name]:Number(e.target.value.replace(/[^0-9.]/g,""))||0})} />
                <button className="sm ghost" onClick={()=>{ const n={...mapState}; delete n[name]; saveMap(n); }}>✗</button>
              </span>
            </div>
          ))}
        </div>
        <div className="row mt12" style={{gap:6}}>
          <input className="grow" placeholder="exercise" value={newMapName} onChange={e=>setNewMapName(e.target.value)} />
          <input style={{width:70}} inputMode="numeric" placeholder="kg" value={newMapVal} onChange={e=>setNewMapVal(e.target.value.replace(/[^0-9.]/g,""))} />
          <button className="sm" onClick={()=>{ if(newMapName.trim()&&newMapVal){ saveMap({...mapState,[newMapName.trim()]:Number(newMapVal)}); setNewMapName("");setNewMapVal(""); } }}>Add</button>
        </div>

      <div className="card">

          {cal.map((p,i)=>(
            <div key={i} className="list-item">
              <div className="col gap4">

            <input className="grow" placeholder="note" value={newPeriod.note} onChange={e=>setNewPeriod({...newPeriod,note:e.target.value})} />
          </div>
          <button className="sm block" onClick={()=>{ if(newPeriod.start&&newPeriod.end){ updateCal([...cal,newPeriod].sort((a,b)=>a.start.localeCompare(b.start))); setNewPeriod({start:"",end:"",type:"MEDIUM",note:""}); } }}>+ Add period</button>
        </div>
      </div>

      <div className="card">
        <h3>Milestones</h3>
        <div className="col mt12" style={{gap:8}}>
          {milestones.map(m=>(
            <div key={m.id} className="list-item">
              <div className="col gap4">
                <span className="small" style={{fontWeight:600}}>{m.name}</span>
                <span className="tiny muted">{m.project} · {m.type} · {effectiveFire(m, today)}</span>
              </div>
              <button className="sm ghost" onClick={()=>{ deleteMilestone(m.id); }}>✗</button>
            </div>
          ))}
        </div>
        <hr className="divider" />
        <MilestoneAdder onAdd={(m)=>saveMilestone(m)} />
      </div>

      <div className="card">
        <h3>Data</h3>
        <div className="col mt12">
          <button className="block" onClick={exportAll}>Export all data</button>
          <label className="field">Import data (paste JSON)
            <textarea value={importTxt} onChange={e=>setImportTxt(e.target.value)} placeholder='{"gc_settings":...}' />
          </label>
          <button className="block" onClick={importAll} disabled={!importTxt.trim()}>Import data</button>
          {msg && <p className="tiny muted">{msg}</p>}
        </div>
        <hr className="divider" />
        <div className="col">
          <p className="tiny muted">Type DELETE to clear all data.</p>
          <div className="row" style={{gap:8}}>
            <input className="grow" value={delConfirm} onChange={e=>setDelConfirm(e.target.value)} placeholder="DELETE" />
            <button className="danger" disabled={delConfirm!=="DELETE"} onClick={clearAll}>Clear</button>
          </div>
        </div>
      </div>

      <p className="tiny muted" style={{textAlign:"center"}}>Ground Control · open weekly to refresh the alert schedule.</p>
    </div>
  );
}

function MilestoneAdder({ onAdd }) {
  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ name:"", project:"Trading", trigger:"", action:"", context:"" });
  if (!open) return <button className="sm block" onClick={()=>setOpen(true)}>+ Add milestone</button>;
  return (
    <div className="col" style={{gap:8}}>
      <input placeholder="name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} />
      <div className="row" style={{gap:6}}>
        <input className="grow" placeholder="project" value={f.project} onChange={e=>setF({...f,project:e.target.value})} />
        <input type="date" value={f.trigger} onChange={e=>setF({...f,trigger:e.target.value})} />
      </div>
      <textarea placeholder="action required" value={f.action} onChange={e=>setF({...f,action:e.target.value})} />
      <input placeholder="context (one fact)" value={f.context} onChange={e=>setF({...f,context:e.target.value})} />
      <div className="row" style={{gap:8}}>
        <button className="primary grow" disabled={!f.name||!f.trigger} onClick={()=>{
          const id = f.name.toLowerCase().replace(/[^a-z0-9]+/g,"_").slice(0,24) + "_" + Date.now().toString(36).slice(-4);
          onAdd({ id, project:f.project||"Trading", name:f.name, type:"date", trigger:f.trigger, action:f.action, context:f.context, drive_file:"portfolio_dashboard" });
          setF({name:"",project:"Trading",trigger:"",action:"",context:""}); setOpen(false);
        }}>Add</button>
        <button className="ghost" onClick={()=>setOpen(false)}>Cancel</button>
      </div>
    </div>
  );
}

/* ============================================================
   BOOT
   ============================================================ */
seedIfNeeded();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
