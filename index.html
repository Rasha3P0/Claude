function TodayTab({ settings, week, today, todayLog, saveLog, saveSettings, logs, events, celebrate, nextAlert, upcomingEvents, nextCluster, setAlertOpen, setTab }) {
  const [sheetOpen, setSheetOpen] = useState(false);
  const [winsHistOpen, setWinsHistOpen] = useState(false);
  const [eventsOpen, setEventsOpen] = useState(false);
  const wt = weeklyTargets(week.type);
  const volTargetDay = wt.volume / 7;
  const proTargetDay = wt.protein / 7;
  const volToday = logVolume(todayLog);
  const proToday = todayLog.diet?.protein_estimate_g || 0;
  const streak = computeStreak(logs || {}, today);
  const counted = dayCounts(todayLog);
  const workoutDone = hasWorkout(todayLog);
  const waterDone = todayLog.water_hit;
  // work vs life mismatch — show both when they differ (item 6)
  const mismatch = week.work.type !== week.life.type;

  const patch = (changes) => saveLog({ ...todayLog, ...changes });

  const hour = new Date().getHours();
  // personal-HIGH window within 7 days feeds the coach (item 6)
  const personalHigh = (nextCluster && nextCluster.days >= 0 && nextCluster.days <= 7)
    ? { range: clusterDateRange(nextCluster), labels: nextCluster.labels.join(" + "), workType: week.work.type }
    : null;
  const coach = coachMessage({
    type: week.type, energy: todayLog.energy, waterHit: todayLog.water_hit,
    estrodot: todayLog.estrodot_on, workoutLogged: workoutDone, hour, personalHigh
  });
  const insight = buildInsight(logs, today, settings);

  // streak framing — loss aversion when today isn't yet logged
  const streakUrgent = !counted && streak > 0;
  const streakLine = counted
    ? `${streak} day${streak===1?"":"s"}`
    : (streak > 0 ? `${streak} · keep it${hour>=18?" tonight":" today"}` : "start a streak");

  // the single next-best action
  let cta;
  if (!workoutDone) cta = { label: week.type==="HIGH" ? "Log a set · 15 min counts today" : "Log a set", run: ()=>setSheetOpen(true) };
  else if (!waterDone) cta = { label: `Mark water ${settings.waterDaily}L hit`, run: ()=>{ haptic([10,30,10]); patch({water_hit:true}); celebrate && celebrate({ title: "Water hit", sub: `${settings.waterDaily}L` }); } };
  else cta = { label: "On target · add bonus volume", run: ()=>setSheetOpen(true) };

  return (
    <div>
      {/* Orientation block */}
      <div className="card hero">
        <div className="row between">
          <span className={"badge " + week.type}>{week.type} week</span>
          <span className={"streak" + (streakUrgent ? " urgent" : "")}><span className="flame">🔥</span> {streakLine}</span>
        </div>
        <p className="small muted mt8">{dayName(today)} · {prettyDate(today)}</p>
        {mismatch && (
          <p className="small mt8 mismatch">
            Work: <b className={"t-"+week.work.type}>{week.work.type}</b> · Life: <b className={"t-"+week.life.type}>{week.life.type}</b> → plan as <b className={"t-"+week.type}>{week.type}</b>
          </p>
        )}
        <p className="mt8" style={{fontWeight:600}}>{week.note}</p>
        <div className="row wrap mt12" style={{gap:8}}>
          <span className="pill"><span className="lab">Volume</span> {Math.round(wt.volume)}kg</span>
          <span className="pill"><span className="lab">Protein</span> {wt.protein}g</span>
          <span className="pill"><span className="lab">Water</span> {settings.waterDaily}L</span>
        </div>
        {/* one clear next move */}
        <button className="primary block mt12 cta" onClick={()=>{ haptic(10); cta.run(); }}>{cta.label}</button>
        {nextAlert && (
          <button className="ghost block mt8" style={{justifyContent:"space-between"}}
            onClick={() => { setTab("alerts"); setAlertOpen({ milestone: nextAlert.m }); }}>
            <span className="small" style={{textAlign:"left"}}>
              <span className="muted tiny">Next alert</span><br/>{nextAlert.m.name}
            </span>
            <span className="small mono" style={{color:"var(--amber)"}}>
              {nextAlert.days === 0 ? "today" : nextAlert.days > 0 ? nextAlert.days + "d" : Math.abs(nextAlert.days)+"d ago"}
            </span>
          </button>
        )}
      </div>

      {/* Upcoming personal events — near the next-alert pill */}
      <UpcomingCard upcomingEvents={upcomingEvents} nextCluster={nextCluster} onExpand={()=>setEventsOpen(true)} />

      {/* Today's focus — quick win */}
      <FocusCard todayLog={todayLog} saveLog={saveLog} celebrate={celebrate} options={settings.focusOptions} />

      {/* Wins — completed reality, below the focus list */}
      <WinsCard todayLog={todayLog} saveLog={saveLog} settings={settings} saveSettings={saveSettings}
        celebrate={celebrate} onHistory={()=>setWinsHistOpen(true)} />

      {/* Today's progress — hero rings */}
      <div className="card">
        <h3>Today's progress</h3>
        <div className="rings mt12">
          <Ring label="Volume" value={volToday} target={volTargetDay} unit="kg" color="var(--accent-1)" />
          <Ring label="Protein" value={proToday} target={proTargetDay} unit="g" color="var(--accent-2)" />
          <Ring label="Water" done={todayLog.water_hit} color="var(--accent-3)" />
        </div>
      </div>

      {/* Rotating experiment — a prompt to try today, recorded for Patterns */}
      <ExperimentCard todayLog={todayLog} saveLog={saveLog} />

      {/* Rotating insight — fresh + something learned, works from day one */}
      {insight && (
        <div className="card insight">
          <span className="ins-ico">◆</span>
          <span className="small">{insight}</span>
        </div>
      )}

      {/* Quick log */}
      <div className="card">
        <h3>Quick log</h3>
        <div className="col mt12">
          <div>
            <div className="small muted mb8">Energy</div>
            <Segment options={energyOpts} value={todayLog.energy} variant="energy" onChange={(v)=>patch({energy:v})} />
          </div>
          <div>
            <div className="small muted mb8">Water {settings.waterDaily}L</div>
            <Segment options={yesNo} value={todayLog.water_hit} variant={todayLog.water_hit?"yes":"no"} onChange={(v)=>patch({water_hit:v})} />
          </div>
          <div className="row" style={{gap:10}}>
            <div className="grow">
              <div className="small muted mb8">Elvanse</div>
              <Segment options={yesNo} value={todayLog.elvanse_taken} variant="health" onChange={(v)=>patch({elvanse_taken:v})} />
            </div>
            <div className="grow">
              <div className="small muted mb8">Estrodot</div>
              <Segment options={yesNo} value={todayLog.estrodot_on} variant="health" onChange={(v)=>patch({estrodot_on:v})} />
            </div>
          </div>
        </div>
        <div className="row mt12" style={{gap:8}}>
          <button className="grow" onClick={()=>setSheetOpen(true)}>+ Quick set</button>
          <button className="ghost grow" onClick={()=>setTab("log")}>Full log</button>
        </div>
      </div>

      {/* Coach message */}
      <div className="card" style={{borderColor:"var(--border)"}}>
        <h3>Read on today</h3>
        <p className="mt8 small">{coach}</p>
      </div>

      {sheetOpen && (
        <QuickSetSheet todayLog={todayLog} settings={settings} saveLog={saveLog} logs={logs}
          celebrate={celebrate} onClose={()=>setSheetOpen(false)} />
      )}
      {winsHistOpen && <WinsHistorySheet logs={logs} today={today} onClose={()=>setWinsHistOpen(false)} />}
      {eventsOpen && <UpcomingEventsSheet events={events} today={today} onClose={()=>setEventsOpen(false)} />}
    </div>
  );
}

/* ============================================================
   ALERTS TAB (Module 2)
   ============================================================ */
function AlertsTab({ milestones, upcoming, alertLogs, setAlertOpen, today }) {
  const [hist, setHist] = useState(false);
  const [proj, setProj] = useState("All");
  const [range, setRange] = useState("30");
  const projects = ["All", ...Array.from(new Set(milestones.map(m=>m.project)))];

  const filteredHist = alertLogs.filter(a => {
    if (proj !== "All" && a.project !== proj) return false;
    if (range === "30") {
      const d = (a.timestamp||"").slice(0,10);
      if (!d || daysBetween(d, today) > 30) return false;
    }
    return true;
  });

  return (
    <div>
      <div className="row between mb8">
        <h1>Alerts</h1>
        <div className="seg" style={{width:170}}>
          <button className={!hist?"on":""} onClick={()=>setHist(false)}>Upcoming</button>
          <button className={hist?"on":""} onClick={()=>setHist(true)}>History</button>
        </div>
      </div>

      {!hist && (
        <div>
          {upcoming.length === 0 && <p className="muted small">Nothing upcoming — all clear.</p>}
          {upcoming.map(({m, fire, days}) => {
            const soon = days <= 7;
            return (
              <button key={m.id} className={"card block alertcard" + (soon ? " soon" : "")}
                style={{textAlign:"left",display:"block",height:"auto",padding:14}}
                onClick={()=>setAlertOpen({ milestone: m })}>
                <div className="row between">
                  <span className="badge project">{m.project}</span>
                  <span className="countdown">{days < 0 ? "overdue" : days === 0 ? "today" : `${days}d`}</span>
                </div>
                <div className="mt8" style={{fontWeight:700,fontSize:15}}>{m.name}</div>
                <div className="row between mt8">
                  <span className="small muted" style={{display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden",marginRight:8}}>{m.action}</span>
                  <span className="tiny muted mono" style={{whiteSpace:"nowrap"}}>{shortDate(fire)}</span>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {hist && (
        <div>
          <div className="row mb8" style={{gap:8}}>
            <select value={proj} onChange={e=>setProj(e.target.value)} style={{flex:1}}>
              {projects.map(p=> <option key={p} value={p}>{p}</option>)}
            </select>
            <select value={range} onChange={e=>setRange(e.target.value)} style={{flex:1}}>
              <option value="30">Last 30 days</option>
              <option value="all">All time</option>
            </select>
          </div>
          {filteredHist.length === 0 && <p className="muted small">No alert responses logged yet.</p>}
          {filteredHist.map((a,i) => (
            <div key={i} className="card" style={{padding:"10px 14px"}}>
              <div className="row between">
                <span style={{fontWeight:600}} className="small">{a.name}</span>
                <span className={"badge " + (a.response==="Confirmed"?"LOW":a.response==="Dismissed"?"HIGH":"MEDIUM")}>{a.response}</span>
              </div>
              <div className="row between mt8">
                <span className="tiny muted">{a.project} · {(a.timestamp||"").slice(0,10)}</span>
              </div>
              {a.note && <p className="small mt8">{a.note}</p>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* Full-screen alert action card + Drive write-back */
function AlertScreen({ milestone: m, settings, recordAlert, saveMilestone, celebrate, onClose }) {
  const [mode, setMode] = useState("card"); // card | confirm | dismiss | drive
  const [note, setNote] = useState("");
  const [reason, setReason] = useState("");
  const [response, setResponse] = useState(null);
  const [copied, setCopied] = useState(false);

  const buildMarkdown = (resp, text) => {
    const now = new Date();
    return `## Ground Control Log — ${m.name}\n` +
      `**Date:** ${isoDate(now)}\n` +
      `**Response:** ${resp}\n` +
      `**Action taken:** ${text || "confirmed as per action description"}\n` +
      `**Timestamp:** ${now.toISOString()}\n`;
  };

  const occurrence = effectiveFire(m, todayStr());
  const doConfirm = () => {
    const text = note.trim() || "confirmed as per action description";
    recordAlert({ id:m.id, name:m.name, project:m.project, response:"Confirmed", note:text, timestamp:new Date().toISOString() });
    saveMilestone(advanceMilestone(m, occurrence));   // advance / retire so it leaves the upcoming list
    setResponse("Confirmed");
    setMode("drive");
    celebrate && celebrate({ title: "Action confirmed", sub: m.project });
  };
  const doDismiss = () => {
    recordAlert({ id:m.id, name:m.name, project:m.project, response:"Dismissed", note:reason.trim()||"not applicable", timestamp:new Date().toISOString() });
    saveMilestone(advanceMilestone(m, occurrence));
    setResponse("Dismissed");
    setMode("drive");
  };
  const doSnooze = () => {
    const d = new Date(); d.setDate(d.getDate()+1);
    saveMilestone({ ...m, snooze_until: isoDate(d) });
    onClose();
  };

  const markdown = response ? buildMarkdown(response, response==="Confirmed" ? note.trim() : reason.trim()) : "";

  return (
    <div className="overlay">
      <div className="row between" style={{padding:"14px 16px",borderBottom:"1px solid var(--border)"}}>
        <span className="badge project">{m.project}</span>
        <button className="ghost sm" onClick={onClose}>Close</button>
      </div>
      <div className="ov-body">
        {mode === "card" && (
          <div>
            <h1 style={{fontSize:22,lineHeight:1.25}}>{m.name}</h1>
            <h3 className="mt12">Action required</h3>
            <p className="mt8">{m.action}</p>
            {m.context && (
              <div className="banner info mt12">{m.context}</div>
            )}
            <div className="col mt12" style={{gap:10}}>
              <button className="primary block" onClick={()=>setMode("confirm")}>✓ Confirm — action taken</button>
              <button className="block" onClick={doSnooze}>⏰ Snooze 24h</button>
              <button className="danger block" onClick={()=>setMode("dismiss")}>✗ Dismiss — not applicable</button>
            </div>
          </div>
        )}

        {mode === "confirm" && (
          <div>
            <h2>Log this action</h2>
            <label className="field mt12">Note (optional)
              <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="What did you do? Leave blank to log as per the action description." />
            </label>
            <button className="primary block mt12" onClick={doConfirm}>Save and prepare Drive entry</button>
            <button className="ghost block mt8" onClick={()=>setMode("card")}>Back</button>
          </div>
        )}

        {mode === "dismiss" && (
          <div>
            <h2>Dismiss — reason</h2>
            <label className="field mt12">Reason
              <textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="Why is this not applicable?" />
            </label>
            <button className="danger block mt12" onClick={doDismiss}>Log as dismissed</button>
            <button className="ghost block mt8" onClick={()=>setMode("card")}>Back</button>
          </div>
        )}

        {mode === "drive" && (
          <div>
            <h2>Write to Drive</h2>
            <p className="small muted mt8">Copy this to your portfolio dashboard. Direct Drive write (OAuth) lands in phase 2.</p>
            <div className="codebox mt12">{markdown}</div>
            <button className="primary block mt12" onClick={async()=>{ const ok = await copyText(markdown); setCopied(ok); }}>
              {copied ? "Copied" : "Copy log entry"}
            </button>
            <button className="block mt8" onClick={()=>window.open("https://drive.google.com","_blank")}>Open Drive</button>
            <button className="ghost block mt8" onClick={onClose}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   LOG TAB (Module 4)
   ============================================================ */
function LogTab({ settings, today, saveLog, saveSettings, logs, events, celebrate, setTab }) {
  const [logDate, setLogDate] = useState(today);
  const isPast = logDate !== today;
  const wt = effectiveWeekFor(logDate, settings.stressCalendar, events); // badge follows max(work, life)
  const base = logs[logDate] || emptyLog(logDate, wt.type);
  const existing = !!logs[logDate];

  return (
    <div>
      <div className="row between mb8">
        <h1>Log</h1>
        <span className={"badge " + wt.type}>{wt.type}</span>
      </div>
      <div className="card" style={{padding:"12px 14px"}}>
        <label className="field">Logging for
          <input type="date" max={today} value={logDate} onChange={e=>setLogDate(e.target.value || today)} />
        </label>
        <p className="tiny muted mt8">
          {dayName(logDate)} · {prettyDate(logDate)}
          {isPast ? (existing ? " · editing a saved past day" : " · backfilling a past day") : " · today"}
        </p>
      </div>
      <DayEditor key={logDate} date={logDate} base={base} settings={settings}
        saveLog={saveLog} saveSettings={saveSettings} logs={logs} today={today}
        celebrate={celebrate} setTab={setTab} isPast={isPast} />
    </div>
  );
}

function DayEditor({ date, base, settings, saveLog, saveSettings, logs, today, celebrate, setTab, isPast }) {
  const map = settings.volumeMap;
  const allNames = Object.keys(map);
  // Pre-filled rows are the top 5 (reorder in Settings); the rest are one tap away.
  const topNames = allNames.slice(0, 5);
  // Default working weight: push-ups = 50% body weight, everything else the map.
  const defWeight = (name) => name === "Push-ups"
    ? Math.round((Number(settings.bodyWeight)||0) * 0.5)
    : (map[name] != null ? map[name] : 0);

  // Each exercise holds one or more sets {weight, reps} for progressive load.
  const toSets = (e, name) => {
    if (e && Array.isArray(e.sets) && e.sets.length)
      return e.sets.map(s => ({ weight: String(s.weight), reps: String(s.reps) }));
    if (e && e.reps)  // legacy {name, reps, volume_kg}: recover the per-rep weight
      return [{ weight: String(e.volume_kg && e.reps ? Math.round(e.volume_kg / e.reps) : defWeight(name)), reps: String(e.reps) }];
    return [{ weight: String(defWeight(name)), reps: "" }];
  };
  const initExercises = () => {
    const saved = base.workout?.exercises || [];
    const shown = topNames.slice();
    saved.forEach(e => { if (!shown.includes(e.name)) shown.push(e.name); });  // keep anything already logged
    return shown.map(n => {
      const e = saved.find(x => x.name === n);
      return { name: n, sets: toSets(e, n), note: (e && e.note) || "" }; // note: optional rest/form (item 2)
    });
  };
  const [rows, setRows] = useState(initExercises);
  // which rows have the rest/notes field expanded — collapsed by default
  const [openNotes, setOpenNotes] = useState({});
  const addExerciseRow = (name) => {
    if (rows.some(r => r.name === name)) return;
    haptic(8);
    setRows([...rows, { name, sets: [{ weight: String(defWeight(name)), reps: "" }], note: "" }]);
  };
  const [life, setLife] = useState(() => (base.workout?.life_volume || []).map(l => ({...l})));
  const [bw, setBw] = useState(settings.bodyWeight);
  const [editBw, setEditBw] = useState(false);
  const [protein, setProtein] = useState(base.diet?.protein_estimate_g ? String(base.diet.protein_estimate_g) : "");
  const [friction, setFriction] = useState(!!base.diet?.friction_hit);
  const [frictionType, setFrictionType] = useState(base.diet?.friction_type || "");
  const [energy, setEnergy] = useState(base.energy);
  const [water, setWater] = useState(base.water_hit);
  const [elvanse, setElvanse] = useState(base.elvanse_taken);
  const [estrodot, setEstrodot] = useState(base.estrodot_on);
  const [sunlight, setSunlight] = useState(base.sunlight || "");
  const [stress, setStress] = useState(base.work?.stress_felt || 3);
  const [notes, setNotes] = useState(base.work?.note || "");

  // custom exercise / life inputs
  const [newExName, setNewExName] = useState("");
  const [newExWeight, setNewExWeight] = useState("");
  const [newExReps, setNewExReps] = useState("");
  const [lifeCustom, setLifeCustom] = useState({ name:"", kg:"", reps:"1" });

  const num = (v) => v.replace(/[^0-9.]/g, "");
  const setVol = (s) => Math.round((Number(s.weight)||0) * (Number(s.reps)||0));
  const rowVol = (r) => r.sets.reduce((a,s)=> a + setVol(s), 0);
  const workoutTotal = rows.reduce((s,r)=> s + rowVol(r), 0);
  const lifeTotal = life.reduce((s,l)=> s + (l.volume_kg||0), 0);
  const combined = workoutTotal + lifeTotal;

  const updateSet = (ri, si, field, val) =>
    setRows(rows.map((r,i)=> i!==ri ? r : { ...r, sets: r.sets.map((s,j)=> j!==si ? s : { ...s, [field]: num(val) }) }));
  const addSet = (ri) => setRows(rows.map((r,i)=> {
    if (i!==ri) return r;
    const last = r.sets[r.sets.length-1] || { weight:"", reps:"" };
    return { ...r, sets: [...r.sets, { weight: last.weight, reps: "" }] };
  }));
  const removeSet = (ri, si) => setRows(rows.map((r,i)=> i!==ri ? r : (r.sets.length>1 ? { ...r, sets: r.sets.filter((_,j)=>j!==si) } : r)));
  const setRowNote = (ri, val) => setRows(rows.map((r,i)=> i!==ri ? r : { ...r, note: val }));
  const addCustomEx = () => {
    if (!newExName.trim()) return;
    setRows([...rows, { name: newExName.trim(), sets: [{ weight: num(newExWeight), reps: num(newExReps) }], note: "" }]);
    setNewExName(""); setNewExWeight(""); setNewExReps("");
  };
  const addLife = (name, kg, reps) => {
    const w = Number(kg)||0, r = Number(reps)||1;
    setLife([...life, { name, weight_kg:w, reps:r, volume_kg: Math.round(w*r) }]);
  };
  const presets = [
    {name:"Vacuum", kg:7.5, reps:1, fixed:true},
    {name:"Groceries", kg:15, reps:1, ask:true},
    {name:"Kid 20kg", kg:20, reps:1, fixed:true},
    {name:"Kid 34kg", kg:34, reps:1, fixed:true},
    {name:"Stairs carry", kg:10, reps:1, ask:true}
  ];

  const saveDay = () => {
    const exercises = rows.map(r => {
      const sets = r.sets
        .map(s => ({ weight: Number(s.weight)||0, reps: Number(s.reps)||0 }))
        .filter(s => s.reps > 0);
      if (!sets.length) return null;
      const ex = {
        name: r.name, sets,
        reps: sets.reduce((a,s)=> a + s.reps, 0),
        volume_kg: Math.round(sets.reduce((a,s)=> a + s.weight * s.reps, 0))
      };
      if (r.note && r.note.trim()) ex.note = r.note.trim(); // keep optional — legacy entries stay clean
      return ex;
    }).filter(Boolean);
    const total = exercises.reduce((s,e)=>s+e.volume_kg,0) + lifeTotal;
    // Spread base first so fields the Log tab doesn't edit (focus, wins,
    // experiment) are preserved rather than wiped.
    const log = {
      ...base,
      date: date,
      energy, water_hit: water, elvanse_taken: elvanse, estrodot_on: estrodot, sunlight,
      workout: { exercises, life_volume: life, total_kg: total },
      diet: { protein_estimate_g: Number(protein)||0, friction_hit: friction, friction_type: friction ? (frictionType||null) : null },
      work: { stress_felt: stress, note: notes }
    };
    // Auto-capture one deduped "session logged" win (item 5). Optional source —
    // exactly one workout-sourced win per day, reflecting the current total.
    let wins = getWins(log).filter(w => w.source !== "workout");
    if (exercises.some(e => (e.reps||0) > 0)) wins = [...wins, makeWin(`Session logged — ${total}kg`, "General", "workout")];
    log.wins = wins;
    saveLog(log);
    if (Number(bw) && Number(bw) !== settings.bodyWeight) saveSettings({ ...settings, bodyWeight: Number(bw) });
    const streak = computeStreak({ ...(logs || {}), [date]: log }, today);
    setTab(isPast ? "patterns" : "today");
    celebrate && celebrate({
      title: isPast ? "Past day saved" : "Day logged",
      sub: isPast ? prettyDate(date) : (streak > 0 ? `${streak} day streak` : "streak started")
    });
  };

  return (
    <div>
      {/* Workout */}
      <div className="card">
        <div className="row between">
          <h3>Workout</h3>
          <button className="sm ghost" onClick={()=>setEditBw(!editBw)}>
            {editBw ? "done" : `${bw}kg ✏`}
          </button>
        </div>
        {editBw && (
          <div className="row mt8" style={{gap:8}}>
            <input inputMode="numeric" value={bw} onChange={e=>setBw(e.target.value.replace(/[^0-9.]/g,""))} />
            <button className="sm" onClick={()=>setEditBw(false)}>Set</button>
          </div>
        )}
        <div className="col mt12" style={{gap:0}}>
          {rows.map((r,ri)=>(
            <div key={ri} className="exg">
              <div className="row between">
                <span className="small" style={{fontWeight:600}}>{r.name}</span>
                <span className="mono small muted">{rowVol(r)}kg</span>
              </div>
              <div className="col mt8" style={{gap:6}}>
                {r.sets.map((s,si)=>(
                  <div key={si} className="set-row">
                    <span className="tiny muted">{si+1}</span>
                    <input inputMode="decimal" placeholder="kg" value={s.weight} onChange={e=>updateSet(ri,si,"weight",e.target.value)} />
                    <span className="tiny muted">×</span>
                    <input inputMode="numeric" placeholder="reps" value={s.reps} onChange={e=>updateSet(ri,si,"reps",e.target.value)} />
                    <span className="vol mono tiny">{setVol(s)}kg</span>
                    {r.sets.length>1
                      ? <button className="sm ghost setx" onClick={()=>removeSet(ri,si)}>✗</button>
                      : <span className="setx" />}
                  </div>
                ))}
              </div>
              <div className="row mt8" style={{gap:8}}>
                <button className="sm ghost addset" onClick={()=>{ haptic(8); addSet(ri); }}>+ set</button>
                {!(openNotes[ri] || (r.note && r.note.length)) && (
                  <button className="sm ghost addset" onClick={()=>{ haptic(6); setOpenNotes({...openNotes,[ri]:true}); }}>+ rest / notes</button>
                )}
              </div>
              {(openNotes[ri] || (r.note && r.note.length)) && (
                <input className="ex-note mt8" placeholder="rest, form notes, how it felt"
                  value={r.note||""} onChange={e=>setRowNote(ri, e.target.value)} />
              )}
            </div>
          ))}
        </div>
        {allNames.filter(n => !rows.some(r => r.name === n)).length > 0 && (
          <div className="mt12">
            <div className="tiny muted mb8">Add from your exercises</div>
            <div className="row wrap" style={{gap:6}}>
              {allNames.filter(n => !rows.some(r => r.name === n)).map(n => (
                <button key={n} className="chip" onClick={()=>addExerciseRow(n)}>+ {n}</button>
              ))}
            </div>
          </div>
        )}
        <hr className="divider" />
        <div className="row" style={{gap:6}}>
          <input className="grow" placeholder="new exercise" value={newExName} onChange={e=>setNewExName(e.target.value)} />
          <input style={{width:60}} inputMode="decimal" placeholder="kg" value={newExWeight} onChange={e=>setNewExWeight(e.target.value.replace(/[^0-9.]/g,""))} />
          <input style={{width:56}} inputMode="numeric" placeholder="reps" value={newExReps} onChange={e=>setNewExReps(e.target.value.replace(/[^0-9]/g,""))} />
          <button className="sm" onClick={addCustomEx}>Add</button>
        </div>
        <div className="row between mt12">
          <span className="muted small">Workout sub-total</span>
          <span className="mono" style={{fontWeight:700}}>{workoutTotal}kg</span>
        </div>
      </div>

      {/* Life volume */}
      <div className="card">
        <h3>Life volume</h3>
        <div className="preset-grid mt12">
          {presets.map(p=>(
            <button key={p.name} className="sm" onClick={()=>{
              if (p.ask) {
                const v = prompt(`${p.name} — weight in kg`, String(p.kg));
                if (v != null) addLife(p.name, v, 1);
              } else addLife(p.name, p.kg, p.reps);
            }}>{p.name}</button>
          ))}
        </div>
        <div className="row mt12" style={{gap:6}}>
          <input className="grow" placeholder="name" value={lifeCustom.name} onChange={e=>setLifeCustom({...lifeCustom,name:e.target.value})} />
          <input style={{width:62}} inputMode="numeric" placeholder="kg" value={lifeCustom.kg} onChange={e=>setLifeCustom({...lifeCustom,kg:e.target.value.replace(/[^0-9.]/g,"")})} />
          <input style={{width:52}} inputMode="numeric" placeholder="×" value={lifeCustom.reps} onChange={e=>setLifeCustom({...lifeCustom,reps:e.target.value.replace(/[^0-9]/g,"")})} />
          <button className="sm" onClick={()=>{ if(lifeCustom.name.trim()&&lifeCustom.kg){ addLife(lifeCustom.name.trim(), lifeCustom.kg, lifeCustom.reps||1); setLifeCustom({name:"",kg:"",reps:"1"});} }}>Add</button>
        </div>
        {life.length>0 && (
          <div className="col mt12" style={{gap:6}}>
            {life.map((l,i)=>(
              <div key={i} className="row between small">
                <span>{l.name} <span className="muted">({l.weight_kg}kg × {l.reps})</span></span>
                <span className="row" style={{gap:8}}>
                  <span className="mono" style={{color:"var(--accent-3)"}}>{l.volume_kg}kg</span>
                  <button className="sm ghost" style={{minHeight:28,padding:"0 8px"}} onClick={()=>setLife(life.filter((_,idx)=>idx!==i))}>✗</button>
                </span>
              </div>
            ))}
          </div>
        )}
        <div className="row between mt12">
          <span className="muted small">Life sub-total</span>
          <span className="mono" style={{fontWeight:700,color:"var(--accent-3)"}}>{lifeTotal}kg</span>
        </div>
        <hr className="divider" />
        <div className="row between">
          <span style={{fontWeight:600}}>Combined total</span>
          <span className="mono" style={{fontWeight:800,fontSize:18}}>{combined}kg</span>
        </div>
      </div>

      {/* Diet */}
      <div className="card">
        <h3>Diet check-in</h3>
        <label className="field mt12">Protein estimate
          <input inputMode="numeric" placeholder="grams — rough estimate is fine" value={protein} onChange={e=>setProtein(e.target.value.replace(/[^0-9]/g,""))} />
        </label>
        <div className="mt12">
          <div className="small muted mb8">Friction today?</div>
          <Segment options={yesNo} value={friction} variant={friction?"no":"yes"} onChange={setFriction} />
        </div>
        {friction && (
          <div className="row wrap mt12" style={{gap:6}}>
            {FRICTION_TYPES.map(f=>(
              <button key={f} className={"sm " + (frictionType===f?"":"ghost")} style={frictionType===f?{background:"var(--amber)",color:"#1a1300",borderColor:"var(--amber)"}:{}} onClick={()=>setFrictionType(f)}>{f}</button>
            ))}
          </div>
        )}
      </div>

      {/* Daily context */}
      <div className="card">
        <h3>Daily context</h3>
        <div className="col mt12" style={{gap:14}}>
          <div><div className="small muted mb8">Energy</div><Segment options={energyOpts} value={energy} variant="energy" onChange={setEnergy} /></div>
          <div><div className="small muted mb8">Water {settings.waterDaily}L</div><Segment options={yesNo} value={water} variant={water?"yes":"no"} onChange={setWater} /></div>
          <div className="row" style={{gap:10}}>
            <div className="grow"><div className="small muted mb8">Elvanse</div><Segment options={yesNo} value={elvanse} variant="health" onChange={setElvanse} /></div>
            <div className="grow"><div className="small muted mb8">Estrodot</div><Segment options={yesNo} value={estrodot} variant="health" onChange={setEstrodot} /></div>
          </div>
          <div><div className="small muted mb8">Sunlight</div>
            <Segment options={[{label:"Outdoors",value:"outdoors"},{label:"Mostly indoors",value:"indoors"}]} value={sunlight} onChange={setSunlight} />
          </div>
          <div><div className="small muted mb8">Work stress felt</div><Segment options={energyOpts} value={stress} onChange={setStress} /></div>

/* ============================================================
   PATTERNS TAB (Module 5)
   ============================================================ */
function PatternsTab({ settings, logs, events, today }) {
  const allLogs = Object.values(logs).sort((a,b)=>a.date.localeCompare(b.date));
  const cal = settings.stressCalendar;

  // group by ISO week (Monday key)
  const weeks = useMemo(() => {
    const groups = {};
    allLogs.forEach(l => {
      const k = mondayOf(l.date);
      (groups[k] = groups[k] || []).push(l);
    });
    return Object.entries(groups).map(([k, items]) => {
      const type = effectiveWeekFor(k, cal, events).type; // targets follow effective (max) type
      const tgt = weeklyTargets(type);
      const volume = items.reduce((s,l)=>s+logVolume(l),0);
      const protein = items.reduce((s,l)=>s+(l.diet?.protein_estimate_g||0),0);
      const frictions = items.filter(l=>l.diet?.friction_hit).length;
      const energy = items.reduce((s,l)=>s+(l.energy||0),0)/items.length;
      const water = items.filter(l=>l.water_hit).length;
      const vsTarget = tgt.volume>0 ? (volume/tgt.volume)*100 : 0;
      return { key:k, type, volume, protein, frictions, energy, water, days:items.length, vsTarget, tgt };
    }).sort((a,b)=>b.key.localeCompare(a.key));
  }, [allLogs, cal, events]);

  // experiment correlation (item 3) — v1 basic: tried days vs all other days
  const experimentStats = useMemo(() => {
    const byId = {};
    allLogs.forEach(l => {
      const e = l.experiment;
      if (e && e.tried) { (byId[e.id] = byId[e.id] || { id:e.id, text:e.text, tried:[] }).tried.push(l); }
    });
    const avg = (arr, f) => arr.length ? arr.reduce((s,l)=>s+f(l),0)/arr.length : 0;
    const rate = (arr, f) => arr.length ? Math.round(100*arr.filter(f).length/arr.length) : 0;
    return Object.values(byId).map(g => {
      const triedDates = new Set(g.tried.map(l=>l.date));
      const other = allLogs.filter(l => !triedDates.has(l.date));
      return {
        id:g.id, text:g.text, n:g.tried.length,
        volTried: Math.round(avg(g.tried, logVolume)), volOther: Math.round(avg(other, logVolume)),
        focusTried: rate(g.tried, l=>l.focus_done), focusOther: rate(other, l=>l.focus_done)
      };
    }).sort((a,b)=>b.n-a.n);
  }, [allLogs]);

  // this month summary
  const month = today.slice(0,7);
  const monthLogs = allLogs.filter(l => l.date.slice(0,7) === month);
  const mVol = monthLogs.reduce((s,l)=>s+logVolume(l),0);
  const mSessions = monthLogs.filter(l=>hasWorkout(l)).length;
  const monthWeeks = weeks.filter(w => w.key.slice(0,7) === month || monthLogs.some(l=>mondayOf(l.date)===w.key));
  const mProteinWeekAvg = monthWeeks.length ? Math.round(monthWeeks.reduce((s,w)=>s+w.protein,0)/monthWeeks.length) : 0;
  const mFriction = monthLogs.filter(l=>l.diet?.friction_hit).length;
  const mWater = monthLogs.filter(l=>l.water_hit).length;
  const mEnergy = monthLogs.length ? (monthLogs.reduce((s,l)=>s+(l.energy||0),0)/monthLogs.length) : 0;

  // correlations (4+ weeks)
  const enoughData = weeks.length >= 4;
  let corr = null;
  if (enoughData) {
    const highWeeks = weeks.filter(w=>w.type==="HIGH");
    const highAvg = highWeeks.length ? Math.round(highWeeks.reduce((s,w)=>s+w.vsTarget,0)/highWeeks.length) : 0;
    const fricW = weeks.filter(w=>w.frictions>0), cleanW = weeks.filter(w=>w.frictions===0);
    const fricVol = fricW.length ? fricW.reduce((s,w)=>s+w.vsTarget,0)/fricW.length : 0;
    const cleanVol = cleanW.length ? cleanW.reduce((s,w)=>s+w.vsTarget,0)/cleanW.length : 0;
    const diff = cleanVol>0 ? Math.round((1 - fricVol/cleanVol)*100) : 0;
    const waterDays = allLogs.filter(l=>l.water_hit), noWaterDays = allLogs.filter(l=>!l.water_hit);
    const wE = waterDays.length ? (waterDays.reduce((s,l)=>s+l.energy,0)/waterDays.length).toFixed(1) : "—";
    const nE = noWaterDays.length ? (noWaterDays.reduce((s,l)=>s+l.energy,0)/noWaterDays.length).toFixed(1) : "—";
    const estDays = allLogs.filter(l=>l.estrodot_on), estLow = estDays.filter(l=>l.energy<=2);
    const estPct = estDays.length ? Math.round((estLow.length/estDays.length)*100) : 0;
    corr = { highAvg, diff, wE, nE, estPct };
  }

  // weekly summary markdown (latest week)
  const summaryMd = useMemo(() => {
    if (!weeks.length) return "";
    const w = weeks[0];
    const note = weekTypeFor(w.key, cal).note;
    const frTypes = allLogs.filter(l=>mondayOf(l.date)===w.key && l.diet?.friction_hit).map(l=>l.diet.friction_type).filter(Boolean);
    const notesTxt = allLogs.filter(l=>mondayOf(l.date)===w.key && l.work?.note).map(l=>l.work.note).join("; ");
    return `## Ground Control — Week of ${shortDate(w.key)}\n` +
      `Work: ${w.type} — ${note}\n` +
      `Volume: ${Math.round(w.volume)}kg (${Math.round(w.vsTarget)}% of ${w.type} target)\n` +
      `Protein: ${w.protein}g / ${w.tgt.protein}g target\n` +
      `Friction: ${frTypes.length ? frTypes.join(", ") : "none"}\n` +
      `Energy avg: ${w.energy.toFixed(1)}/5\n` +
      `Water: ${w.water}/${w.days} days\n` +
      `Notes: ${notesTxt || "none"}\n`;
  }, [weeks, allLogs, cal]);

  const [copyMsg, setCopyMsg] = useState("");

  const rowClass = (pct) => pct>=90 ? "r-green" : pct>=60 ? "r-amber" : "r-red";

  return (
    <div>
      <h1 className="mb8">Patterns</h1>

      <div className="card hero">
        <h3>This month</h3>
        <div className="statgrid mt12">
          <div className="stat"><div className="bignum grad">{Math.round(mVol)}</div><div className="stat-lab">volume kg</div></div>
          <div className="stat"><div className="bignum">{mSessions}</div><div className="stat-lab">sessions</div></div>
          <div className="stat"><div className="bignum">{mProteinWeekAvg}</div><div className="stat-lab">protein/wk</div></div>
          <div className="stat"><div className="bignum">{mEnergy.toFixed(1)}</div><div className="stat-lab">avg energy</div></div>
          <div className="stat"><div className="bignum">{mWater}<span className="stat-of">/{monthLogs.length}</span></div><div className="stat-lab">water days</div></div>
          <div className="stat"><div className="bignum">{mFriction}</div><div className="stat-lab">friction</div></div>
        </div>
      </div>

      <div className="card">
        <h3>Week by week</h3>
        {weeks.length === 0 && <p className="muted small mt8">No data yet.</p>}
        {weeks.length > 0 && (
          <table className="weeks mt8">
            <thead><tr>
              <th>Week</th><th>Type</th><th>Vol</th><th>vs%</th><th>Prot</th><th>Fr</th><th>En</th>
            </tr></thead>
            <tbody>
              {weeks.map(w=>(
                <tr key={w.key} className={rowClass(w.vsTarget)}>
                  <td>{shortDate(w.key)}</td>
                  <td>{w.type[0]}</td>
                  <td className="num">{Math.round(w.volume)}</td>
                  <td className="num">{Math.round(w.vsTarget)}%</td>
                  <td className="num">{w.protein}</td>
                  <td className="num">{w.frictions}</td>
                  <td className="num">{w.energy.toFixed(1)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>

      <div className="card">
        <h3>Correlations</h3>
        {!enoughData && <p className="muted small mt8">Patterns appear after 4 weeks of logging. Keep going.</p>}
        {enoughData && corr && (
          <div className="col mt8 small" style={{gap:10}}>
            <p className="corr">HIGH weeks averaged {corr.highAvg}% of volume target.</p>
            <p className="corr">Weeks with diet friction: {corr.diff}% lower volume than friction-free weeks.</p>
            <p className="corr">Days water was hit: avg energy {corr.wE}/5. Days it wasn't: {corr.nE}/5.</p>
            <p className="corr">Estrodot on + energy ≤ 2: {corr.estPct}% of Estrodot days.</p>
          </div>
        )}
      </div>

      <div className="card">
        <h3>Experiments</h3>
        {experimentStats.length === 0 && (
          <p className="muted small mt8">Mark experiments tried on Today to see how they correlate with your logged days.</p>
        )}
        {experimentStats.length > 0 && (
          <div className="col mt8 small" style={{gap:12}}>
            {experimentStats.map(s => (
              <div key={s.id} className="corr">
                <div style={{fontWeight:650}}>{s.text}</div>
                <div className="tiny muted mt8">
                  Tried {s.n} day{s.n===1?"":"s"} · volume {s.volTried}kg vs {s.volOther}kg · focus done {s.focusTried}% vs {s.focusOther}%
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card">
        <h3>Export</h3>
        <div className="col mt12">
          <button className="primary block" onClick={async()=>{ const ok = await copyText(JSON.stringify(buildExportDump(),null,2)); setCopyMsg(ok?"Everything copied — settings, logs, milestones, alerts":"Copy failed"); }}>Copy everything (JSON)</button>
          <button className="block" onClick={async()=>{ const ok = await copyText(summaryMd); setCopyMsg(ok?"Weekly summary copied":"Copy failed"); }}>Copy weekly summary</button>
          {copyMsg && <p className="tiny muted">{copyMsg}</p>}
        </div>
        {summaryMd && <div className="codebox mt12">{summaryMd}</div>}
      </div>
    </div>
  );
}

/* Add / remove / reorder editor for a list of short strings (items 1 & 5).
   Shared by the Today's-focus list and the win-category list. */
function StringListEditor({ items, onChange, placeholder }) {
  const [draft, setDraft] = useState("");
  const move = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= items.length) return;
    const next = items.slice(); next.splice(j, 0, next.splice(i, 1)[0]); onChange(next);
  };
  const add = () => {
    const v = draft.trim();
    if (!v || items.includes(v)) return;
    onChange([...items, v]); setDraft("");
  };
  return (
    <div>
      <div className="col mt12" style={{gap:6}}>
        {items.map((it, idx) => (
          <div key={idx} className="row between" style={{padding:"4px 0"}}>
            <span className="small grow" style={{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{it}</span>
            <span className="row" style={{gap:4}}>
              <button className="sm ghost" disabled={idx===0} onClick={()=>{ haptic(6); move(idx,-1); }}>↑</button>
              <button className="sm ghost" disabled={idx===items.length-1} onClick={()=>{ haptic(6); move(idx,1); }}>↓</button>
              <button className="sm ghost" onClick={()=>{ haptic(8); onChange(items.filter((_,i)=>i!==idx)); }}>✗</button>
            </span>
          </div>
        ))}
        {items.length===0 && <p className="tiny muted">Empty — add one below.</p>}
      </div>
      <div className="row mt12" style={{gap:6}}>
        <input className="grow" placeholder={placeholder} value={draft} onChange={e=>setDraft(e.target.value)}
          onKeyDown={e=>{ if (e.key==="Enter") add(); }} />
        <button className="sm" disabled={!draft.trim()} onClick={add}>Add</button>
      </div>
    </div>
  );
}

          </label>
          <button className="block" onClick={importAll} disabled={!importTxt.trim()}>Import data</button>
          {msg && <p className="tiny muted">{msg}</p>}
        </div>
        <hr className="divider" />
        <div className="col">
          <p className="tiny muted">Type DELETE to clear all data.</p>
          <div className="row" style={{gap:8}}>
            <input className="grow" value={delConfirm} onChange={e=>setDelConfirm(e.target.value)} placeholder="DELETE" />
            <button className="danger" disabled={delConfirm!=="DELETE"} onClick={clearAll}>Clear</button>
          </div>
        </div>
      </div>

      <p className="tiny muted" style={{textAlign:"center"}}>Ground Control · open weekly to refresh the alert schedule.</p>
    </div>
  );
}

function MilestoneAdder({ onAdd }) {
  const [open, setOpen] = useState(false);
  const [f, setF] = useState({ name:"", project:"Trading", trigger:"", action:"", context:"" });
  if (!open) return <button className="sm block" onClick={()=>setOpen(true)}>+ Add milestone</button>;
  return (
    <div className="col" style={{gap:8}}>
      <input placeholder="name" value={f.name} onChange={e=>setF({...f,name:e.target.value})} />
      <div className="row" style={{gap:6}}>
        <input className="grow" placeholder="project" value={f.project} onChange={e=>setF({...f,project:e.target.value})} />
        <input type="date" value={f.trigger} onChange={e=>setF({...f,trigger:e.target.value})} />
      </div>
      <textarea placeholder="action required" value={f.action} onChange={e=>setF({...f,action:e.target.value})} />
      <input placeholder="context (one fact)" value={f.context} onChange={e=>setF({...f,context:e.target.value})} />
      <div className="row" style={{gap:8}}>
        <button className="primary grow" disabled={!f.name||!f.trigger} onClick={()=>{
          const id = f.name.toLowerCase().replace(/[^a-z0-9]+/g,"_").slice(0,24) + "_" + Date.now().toString(36).slice(-4);
          onAdd({ id, project:f.project||"Trading", name:f.name, type:"date", trigger:f.trigger, action:f.action, context:f.context, drive_file:"portfolio_dashboard" });
          setF({name:"",project:"Trading",trigger:"",action:"",context:""}); setOpen(false);
        }}>Add</button>
        <button className="ghost" onClick={()=>setOpen(false)}>Cancel</button>
      </div>
    </div>
  );
}

/* ============================================================
   BOOT
   ============================================================ */
seedIfNeeded();
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
