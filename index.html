<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0d1117" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Ground Control" />
<meta name="description" content="Persistent second brain — life systems, trading alerts, and orientation." />
<title>Ground Control</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="icon" type="image/png" href="icons/icon-192.png" />

<style>
  :root {
    --bg: #090c12;
    --bg-2: #0d1117;
    --surface: #151b24;
    --surface-2: #1d2531;
    --surface-3: #26303f;
    --border: #2a3340;
    --text-primary: #f1f5fa;
    --text-secondary: #8b96a6;
    --high: #ff5d54;
    --medium: #ffb224;
    --low: #3fe07a;
    --blue: #5cb6ff;
    --purple: #c792ff;
    --pink: #ff7ac6;
    --cyan: #42e8e0;
    --amber: #ffb224;
    --nav-h: 60px;
    --grad-low: linear-gradient(135deg, #4dffa0, #16b65f);
    --grad-purple: linear-gradient(135deg, #cf9bff, #7a4bff);
    --grad-blue: linear-gradient(135deg, #6fc0ff, #2f7bff);
    --grad-high: linear-gradient(135deg, #ff8a5c, #f8434a);
    --grad-amber: linear-gradient(135deg, #ffce5c, #ff9a1f);

    /* semantic accents — overridden per skin (default = Hot Pink) */
    --accent-1: #ff4fb0; --accent-2: #c792ff; --accent-3: #5cd6ff;
    --grad-1: linear-gradient(135deg, #ff7ad0, #ff1f8f);
    --grad-2: linear-gradient(135deg, #cf9bff, #7a4bff);
    --grad-3: linear-gradient(135deg, #86e6ff, #2f8bff);
    --glow-1: rgba(255,31,143,0.5);
    --glow-a: rgba(255,31,143,0.13); --glow-b: rgba(199,146,255,0.10);
    --on-accent: #2a0716;
  }

  /* ---- skins ---- */
  .app[data-skin="hotpink"] {
    --accent-1: #ff4fb0; --accent-2: #c792ff; --accent-3: #5cd6ff;
    --grad-1: linear-gradient(135deg, #ff7ad0, #ff1f8f);
    --grad-2: linear-gradient(135deg, #cf9bff, #7a4bff);
    --grad-3: linear-gradient(135deg, #86e6ff, #2f8bff);
    --glow-1: rgba(255,31,143,0.5); --glow-a: rgba(255,31,143,0.14); --glow-b: rgba(199,146,255,0.10);
    --on-accent: #2a0716;
  }
  .app[data-skin="vapor"] {
    --accent-1: #ff5fd0; --accent-2: #9b8cff; --accent-3: #3fe8e0;
    --grad-1: linear-gradient(135deg, #ff8ae0, #ff2db0);
    --grad-2: linear-gradient(135deg, #b4a6ff, #6a5bff);
    --grad-3: linear-gradient(135deg, #7ff5ee, #23c7c0);
    --glow-1: rgba(255,45,176,0.46); --glow-a: rgba(255,45,176,0.14); --glow-b: rgba(63,232,224,0.11);
    --on-accent: #220a2a;
  }
  .app[data-skin="sunset"] {
    --accent-1: #ff7a8a; --accent-2: #ffb24b; --accent-3: #ff5fb0;
    --grad-1: linear-gradient(135deg, #ff9a6b, #ff3d7a);
    --grad-2: linear-gradient(135deg, #ffd166, #ff9a1f);
    --grad-3: linear-gradient(135deg, #ff9ad6, #ff2d95);
    --glow-1: rgba(255,61,122,0.46); --glow-a: rgba(255,90,80,0.14); --glow-b: rgba(255,178,75,0.10);
    --on-accent: #2a0a10;
  }
  .app[data-skin="mint"] {
    --accent-1: #3fe07a; --accent-2: #42e8e0; --accent-3: #5cb6ff;
    --grad-1: linear-gradient(135deg, #4dffa0, #16b65f);
    --grad-2: linear-gradient(135deg, #7ff5ee, #23c7c0);
    --grad-3: linear-gradient(135deg, #6fc0ff, #2f7bff);
    --glow-1: rgba(63,224,122,0.44); --glow-a: rgba(63,224,122,0.11); --glow-b: rgba(66,232,224,0.09);
    --on-accent: #042713;
  }
  .app[data-skin="mission"] {
    --accent-1: #3fb950; --accent-2: #bc8cff; --accent-3: #58a6ff;
    --grad-1: linear-gradient(135deg, #3fb950, #2ea043);
    --grad-2: linear-gradient(135deg, #bc8cff, #8957e5);
    --grad-3: linear-gradient(135deg, #58a6ff, #388bfd);
    --glow-1: rgba(63,185,80,0.34); --glow-a: rgba(63,185,80,0.07); --glow-b: rgba(88,166,255,0.05);
    --on-accent: #04140a;
  }

  /* skin swatches in settings */
  .skin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
  .skin-sw {
    position: relative; min-height: 56px; border-radius: 13px; border: 2px solid var(--border);
    color: #fff; font-weight: 800; font-size: 14px; padding: 0 12px;
    display: flex; align-items: center; justify-content: flex-start;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5); cursor: pointer;
    transition: transform 120ms cubic-bezier(.2,.8,.3,1.3), border-color 120ms ease;
  }
  .skin-sw:active { transform: scale(0.96); }
  .skin-sw.on { border-color: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.18); }
  .skin-sw .tick { position: absolute; top: 7px; right: 9px; font-size: 14px; }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    background: var(--bg);
  }
  #root { min-height: 100vh; }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
  }
  .app::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(130% 55% at 50% -8%, var(--glow-a), transparent 60%),
      radial-gradient(90% 50% at 105% 4%, var(--glow-b), transparent 55%);
  }
  .content {
    padding: 16px 14px calc(80px + env(safe-area-inset-bottom));
    animation: fade 140ms ease;
  }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  h1, h2, h3 { margin: 0; font-weight: 750; letter-spacing: -0.3px; }
  h1 { font-size: 24px; }
  h2 { font-size: 17px; }
  h3 { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; }
  p { margin: 0; }
  .muted { color: var(--text-secondary); }
  .small { font-size: 13px; }
  .tiny { font-size: 12px; }
  .mono { font-variant-numeric: tabular-nums; }
  .bignum { font-size: 30px; font-weight: 800; letter-spacing: -1px; line-height: 1; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 26px rgba(0,0,0,0.28);
  }
  .hero {
    background:
      linear-gradient(165deg, color-mix(in srgb, var(--active) 16%, var(--surface)), var(--surface) 62%);
    border: 1px solid color-mix(in srgb, var(--active) 38%, var(--border));
    box-shadow: 0 10px 34px color-mix(in srgb, var(--active) 20%, transparent), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .row.wrap { flex-wrap: wrap; }
  .between { justify-content: space-between; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .gap4 { gap: 4px; } .gap12 { gap: 12px; }
  .mt8 { margin-top: 8px; } .mt12 { margin-top: 12px; } .mb8 { margin-bottom: 8px; }
  .grow { flex: 1; }

  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 5px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 800; letter-spacing: 0.6px;
    text-transform: uppercase;
  }
  .badge.HIGH { background: rgba(255,93,84,0.16); color: var(--high); border: 1px solid rgba(255,93,84,0.5); box-shadow: 0 0 16px rgba(255,93,84,0.22); }
  .badge.MEDIUM { background: rgba(255,178,36,0.16); color: var(--medium); border: 1px solid rgba(255,178,36,0.5); box-shadow: 0 0 16px rgba(255,178,36,0.22); }
  .badge.LOW { background: rgba(63,224,122,0.16); color: var(--low); border: 1px solid rgba(63,224,122,0.5); box-shadow: 0 0 16px rgba(63,224,122,0.22); }
  .badge.project { background: var(--surface-3); color: var(--text-secondary); border: 1px solid var(--border); box-shadow: none; }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 8px 13px; font-size: 13px; font-weight: 700;
  }
  .pill .lab { color: var(--text-secondary); font-weight: 500; }

  .streak {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px; font-weight: 800; font-size: 13px;
    background: linear-gradient(135deg, rgba(255,178,36,0.2), rgba(255,122,84,0.2));
    border: 1px solid rgba(255,178,36,0.5); color: var(--amber);
  }
  .streak .flame { filter: drop-shadow(0 0 6px rgba(255,150,40,0.85)); }
  .streak.urgent { animation: streakpulse 1.4s ease-in-out infinite; }
  @keyframes streakpulse { 0%,100% { box-shadow: 0 0 0 rgba(255,178,36,0); } 50% { box-shadow: 0 0 14px rgba(255,178,36,0.5); } }

  /* exercise chips (quick-set picker) */
  .chip {
    min-height: 38px; padding: 0 13px; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-secondary);
  }
  .chip.on { background: var(--grad-1); color: var(--on-accent); border: 0; box-shadow: 0 4px 14px var(--glow-1); }

  /* primary next-action CTA gets extra presence */
  button.cta { min-height: 52px; font-size: 16px; letter-spacing: -0.2px; }

  /* rotating insight card */
  .insight { display: flex; align-items: center; gap: 10px; padding: 13px 14px;
    border-left: 3px solid var(--accent-2); background: var(--surface); }
  .insight .ins-ico { color: var(--accent-2); font-size: 13px; filter: drop-shadow(0 0 6px var(--accent-2)); }

  /* today's focus */
  .focus { border-left: 3px solid var(--accent-1); }
  .focus.done { opacity: 0.82; }
  .focus .focus-text { font-weight: 750; font-size: 17px; letter-spacing: -0.2px; }
  .focus.done .focus-text { text-decoration: line-through; color: var(--text-secondary); }
  .focus-opt { width: 100%; justify-content: flex-start; text-align: left; height: auto;
    min-height: 46px; padding: 11px 14px; font-weight: 600; }
  .focus-opt:active { border-color: var(--accent-1); }

  /* patterns stat tiles */
  .statgrid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .stat { background: rgba(0,0,0,0.22); border: 1px solid var(--border); border-radius: 13px; padding: 12px 8px; text-align: center; }
  .stat .bignum { font-size: 24px; }
  .stat .stat-of { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
  .stat-lab { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-secondary); margin-top: 3px; }
  .bignum.grad { background: var(--grad-1); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .corr { padding-left: 14px; position: relative; }
  .corr::before { content: ""; position: absolute; left: 0; top: 7px; width: 7px; height: 7px; border-radius: 999px; background: var(--accent-2); box-shadow: 0 0 7px var(--accent-2); }

  /* alerts cards */
  .alertcard { border-left: 3px solid var(--border); transition: transform 120ms ease; }
  .alertcard:active { transform: scale(0.99); }
  .alertcard.soon { border-left-color: var(--amber); box-shadow: 0 0 18px rgba(255,178,36,0.18), inset 0 1px 0 rgba(255,255,255,0.04); }
  .countdown { font-weight: 800; font-size: 17px; font-variant-numeric: tabular-nums; color: var(--text-secondary); }
  .alertcard.soon .countdown { color: var(--amber); }

  /* settings reorder */
  .rank { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px;
    border-radius: 6px; background: var(--grad-1); color: var(--on-accent); font-size: 11px; font-weight: 800; }
  .top5 .small { font-weight: 700; }

  button {
    font-family: inherit; font-size: 15px; cursor: pointer;
    border-radius: 13px; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text-primary);
    min-height: 46px; padding: 0 15px; font-weight: 650;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 120ms cubic-bezier(.2,.8,.3,1.3), filter 120ms ease, box-shadow 200ms ease;
  }
  button:active { transform: scale(0.95); }
  button.primary { background: var(--grad-1); color: var(--on-accent); border: 0; font-weight: 800;
    box-shadow: 0 6px 22px var(--glow-1), inset 0 1px 0 rgba(255,255,255,0.3); }
  button.primary:active { box-shadow: 0 3px 12px var(--glow-1); }
  button.block { width: 100%; }
  button.ghost { background: transparent; }
  button.danger { background: rgba(255,93,84,0.14); color: var(--high); border-color: rgba(255,93,84,0.5); }
  button.sm { min-height: 38px; font-size: 13px; padding: 0 11px; border-radius: 10px; }
  button:disabled { opacity: 0.4; }

  input, select, textarea {
    font-family: inherit; font-size: 16px;
    background: var(--bg-2); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 11px;
    padding: 11px 13px; min-height: 46px; width: 100%;
  }
  textarea { min-height: 64px; resize: vertical; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(92,182,255,0.2); }
  label.field { display: flex; flex-direction: column; gap: 5px; font-size: 13px; color: var(--text-secondary); }

  /* segmented selectors (energy, yes/no) */
  .seg { display: flex; gap: 7px; }
  .seg button {
    flex: 1; min-height: 46px; padding: 0 4px; border-radius: 12px;
    background: var(--bg-2); color: var(--text-secondary); font-weight: 700;
  }
  .seg button.on { background: var(--surface-3); color: var(--text-primary); border-color: var(--border); }
  .seg button.on.yes { background: var(--grad-1); color: var(--on-accent); border: 0; box-shadow: 0 4px 16px var(--glow-1); }
  .seg button.on.no { background: var(--grad-high); color: #fff; border: 0; box-shadow: 0 4px 16px rgba(248,67,74,0.3); }
  .seg button.on.energy { background: var(--grad-3); color: #fff; border: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
  .seg button.on.health { background: var(--grad-2); color: #fff; border: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }

  /* hero progress rings */
  .rings { display: flex; justify-content: space-around; gap: 6px; }
  .ring { position: relative; width: 104px; height: 104px; display: flex; align-items: center; justify-content: center; }
  .ring svg { transform: rotate(-90deg); }
  .ring .ring-bg { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 9; }
  .ring .ring-fg { fill: none; stroke-width: 9; stroke-linecap: round;
    transition: stroke-dashoffset 0.85s cubic-bezier(.2,.8,.3,1);
    filter: drop-shadow(0 0 5px currentColor); }
  .ring.complete .ring-fg { animation: ringpulse 1.6s ease-in-out infinite; }
  @keyframes ringpulse { 0%,100% { filter: drop-shadow(0 0 3px currentColor); } 50% { filter: drop-shadow(0 0 13px currentColor); } }
  .ring-center { position: absolute; text-align: center; }
  .ring-num { font-size: 23px; font-weight: 800; letter-spacing: -0.5px; line-height: 1.05; }
  .ring-lab { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); font-weight: 700; margin-top: 2px; }
  .ring-sub { font-size: 9.5px; color: var(--text-secondary); }

  /* progress bars (legacy / secondary) */
  .bar-wrap { display: flex; flex-direction: column; gap: 6px; }
  .bar-head { display: flex; justify-content: space-between; font-size: 13px; }
  .bar-track { height: 13px; background: rgba(255,255,255,0.05); border: 0; border-radius: 999px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.45); }
  .bar-fill { height: 100%; border-radius: 999px; width: 0; transition: width 600ms cubic-bezier(.2,.8,.3,1); }

  .divider { height: 1px; background: var(--border); margin: 14px 0; border: 0; }

  /* exercise / log rows */
  .ex-row { display: grid; grid-template-columns: 1fr 84px 78px; gap: 8px; align-items: center; }
  .ex-row .vol { text-align: right; color: var(--text-secondary); font-size: 13px; }
  .ex-row input { text-align: center; padding: 8px; }

  /* per-set exercise editor */
  .exg { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .exg:last-of-type { border-bottom: 0; }
  .set-row { display: grid; grid-template-columns: 16px 1fr 12px 1fr 58px 34px; gap: 6px; align-items: center; }
  .set-row input { text-align: center; padding: 8px; min-height: 42px; }
  .set-row .vol { text-align: right; color: var(--text-secondary); }
  .set-row .setx { min-height: 34px; padding: 0; width: 34px; }
  .addset { margin-top: 8px; min-height: 36px; }

  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .preset-grid button { justify-content: flex-start; }

  table.weeks { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.weeks th, table.weeks td { padding: 7px 6px; text-align: left; border-bottom: 1px solid var(--border); }
  table.weeks th { color: var(--text-secondary); font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; }
  table.weeks td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr.r-green td:first-child { box-shadow: inset 3px 0 0 var(--low); }
  tr.r-amber td:first-child { box-shadow: inset 3px 0 0 var(--medium); }
  tr.r-red td:first-child { box-shadow: inset 3px 0 0 var(--high); }

  /* bottom nav */
  nav.tabs {
    position: fixed; left: 0; right: 0; bottom: 0;
    max-width: 430px; margin: 0 auto;
    height: calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    display: flex; background: rgba(13,17,23,0.9); backdrop-filter: blur(14px);
    border-top: 1px solid var(--border); z-index: 40;
  }
  nav.tabs button {
    position: relative;
    flex: 1; min-height: var(--nav-h); border: 0; border-radius: 0; background: transparent;
    flex-direction: column; gap: 3px; color: var(--text-secondary);
    font-size: 10px; letter-spacing: 0.3px; padding: 7px 0; font-weight: 700;
    transition: color 140ms ease;
  }
  nav.tabs button .ico { font-size: 19px; line-height: 1; transition: transform 160ms cubic-bezier(.2,.8,.3,1.4), filter 160ms ease; }
  nav.tabs button.active { color: var(--active); }
  nav.tabs button.active .ico { transform: translateY(-1px) scale(1.16); filter: drop-shadow(0 0 9px var(--active)); }
  nav.tabs button.active::before {
    content: ""; position: absolute; top: 7px; width: 38px; height: 30px;
    border-radius: 11px; background: var(--active); opacity: 0.16;
  }
  nav.tabs button .nbadge {
    position: absolute; top: 5px; transform: translateX(15px);
    background: var(--grad-amber); color: #1a1300; font-size: 10px; font-weight: 800;
    border-radius: 999px; min-width: 17px; height: 17px; padding: 0 4px;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 0 10px rgba(255,178,36,0.6);
  }

  /* overlays */
  .overlay {
    position: fixed; inset: 0; z-index: 60; background: var(--bg);
    max-width: 430px; margin: 0 auto;
    display: flex; flex-direction: column;
    animation: fade 100ms ease;
  }
  .overlay .ov-body { padding: 16px; overflow-y: auto; flex: 1; }
  .sheet {
    position: fixed; inset: 0; z-index: 55; background: rgba(0,0,0,0.55);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .sheet-inner {
    width: 100%; max-width: 430px; background: var(--surface);
    border-top-left-radius: 16px; border-top-right-radius: 16px;
    border-top: 1px solid var(--border);
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
    max-height: 88vh; overflow-y: auto;
    animation: slideup 160ms ease;
  }
  @keyframes slideup { from { transform: translateY(24px); } to { transform: translateY(0); } }

  .banner {
    border-radius: 10px; padding: 10px 12px; font-size: 13px; margin-bottom: 12px;
    border: 1px solid;
  }
  .banner.warn { background: rgba(210,153,34,0.12); border-color: rgba(210,153,34,0.4); color: var(--amber); }
  .banner.info { background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.35); color: var(--blue); }

  .codebox {
    background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
    padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11.5px; white-space: pre-wrap; word-break: break-word;
    color: var(--text-primary); max-height: 220px; overflow-y: auto;

/* ============================================================
   DATE + DOMAIN HELPERS
   ============================================================ */
function isoDate(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,"0"), day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function parseISO(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
function todayStr() { return isoDate(new Date()); }
function dayName(s) { return parseISO(s).toLocaleDateString("en-GB",{weekday:"long"}); }
function prettyDate(s) { return parseISO(s).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}); }
function shortDate(s) { return parseISO(s).toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function daysBetween(aStr, bStr) {
  const a = parseISO(aStr), b = parseISO(bStr);
  return Math.round((b - a) / 86400000);
}
function mondayOf(s) {
  const d = parseISO(s); const wd = (d.getDay() + 6) % 7; // Mon=0
  d.setDate(d.getDate() - wd); return isoDate(d);
}
function lastTradingDayOfMonth(year, monthIdx) { // monthIdx 0-based
  let d = new Date(year, monthIdx + 1, 0); // last calendar day
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}

function weekTypeFor(dateStr, calendar) {
  for (const p of calendar) {
    if (dateStr >= p.start && dateStr <= p.end) return { type: p.type, note: p.note };
  }
  return { type: "LOW", note: "No scheduled work period — treated as baseline." };
}
function weeklyTargets(type) {
  if (type === "HIGH")   return { volume: 1120, protein: 900 };
  if (type === "MEDIUM") return { volume: 1820, protein: 1050 };
  return { volume: 2800, protein: 1180 };
}
function pctOfBaseline(type) { return type==="HIGH"?40 : type==="MEDIUM"?65 : 100; }

/* ============================================================
   LIFE-STRESS LAYER (Module / item 6) — events + max(work, life)
   ============================================================ */
const SEV = { LOW: 0, MEDIUM: 1, HIGH: 2 };
function maxType(a, b) { return SEV[a] >= SEV[b] ? a : b; }

/* life-stress for one ISO week (Monday key), from personal events in it.
   Cluster rule (v1): 2+ heavy events within a 4-day window → HIGH;
   1+ heavy event → MEDIUM; else LOW. */
function lifeStressForWeek(mondayStr, events) {
  const start = mondayStr;
  const e = parseISO(mondayStr); e.setDate(e.getDate() + 6);
  const end = isoDate(e);
  const inWeek = (events || []).filter(ev => ev.date >= start && ev.date <= end)
    .sort((a, b) => a.date.localeCompare(b.date));
  const heavy = inWeek.filter(ev => ev.load === "heavy");
  let type = heavy.length >= 1 ? "MEDIUM" : "LOW";
  for (let i = 0; i < heavy.length; i++)
    for (let j = i + 1; j < heavy.length; j++)
      if (Math.abs(daysBetween(heavy[i].date, heavy[j].date)) <= 3) type = "HIGH";
  return { type, events: inWeek, heavy };
}

/* effective week type = the higher of work-stress and life-stress.
   Returns { type, note, work:{type,note}, life:{type,events,heavy} }. */
function effectiveWeekFor(dateStr, calendar, events) {
  const work = weekTypeFor(dateStr, calendar);
  const life = lifeStressForWeek(mondayOf(dateStr), events);
  return { type: maxType(work.type, life.type), note: work.note, work, life };
}

/* group heavy events into clusters (each step within a 4-day window).
   A cluster with 2+ heavy events is a personal-HIGH window. */
function heavyClusters(events) {
  const heavy = (events || []).filter(e => e.load === "heavy")
    .sort((a, b) => a.date.localeCompare(b.date));
  const groups = [];
  let cur = [];
  heavy.forEach(ev => {
    if (cur.length && daysBetween(cur[cur.length - 1].date, ev.date) <= 3) cur.push(ev);
    else { if (cur.length) groups.push(cur); cur = [ev]; }
  });
  if (cur.length) groups.push(cur);
  return groups.filter(g => g.length >= 2).map(g => ({
    start: g[0].date, end: g[g.length - 1].date,
    events: g, labels: g.map(e => e.label)
  }));
}
function clusterDateRange(c) {
  const a = parseISO(c.start), b = parseISO(c.end);
  const sameMonth = a.getMonth() === b.getMonth();
  const mon = a.toLocaleDateString("en-GB", { month: "short" });
  return sameMonth ? `${mon} ${a.getDate()}–${b.getDate()}` : `${shortDate(c.start)} – ${shortDate(c.end)}`;
}

   ============================================================ */
let _winSeq = 0;
function makeWin(text, category, source) {

function getWins(log) { return log && Array.isArray(log.wins) ? log.wins : []; }
function normWin(s) { return (s || "").trim().toLowerCase(); }
function winTime(ts) {
  if (!ts || ts.indexOf("T") < 0) return "";
  try { return new Date(ts).toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" }); }
  catch (e) { return ts.slice(11, 16); }
}

/* the experiment shown on a given day — deterministic daily rotation (item 3) */
function experimentFor(dateStr) {
  if (!EXPERIMENTS.length) return null;
  const d = parseISO(dateStr);
  const doy = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
  return EXPERIMENTS[doy % EXPERIMENTS.length];
}

/* next-fire computation for a milestone, from a reference date string */
function getNextFire(m, fromStr) {
  const from = parseISO(fromStr);
  const cmp = (dStr) => dStr; // dates compare lexicographically when ISO

  if (m.type === "date") return m.trigger;

  if (m.type === "recurring_monthly" && m.trigger === "last_trading_day_of_month") {
    const months = m.months || [];
    for (const ym of months) {
      const [y, mo] = ym.split("-").map(Number);
      const d = isoDate(lastTradingDayOfMonth(y, mo - 1));
      if (cmp(d) >= fromStr) return d;
    }
    // all tranches in the past: fall back to the last configured one
    if (months.length) { const [y, mo] = months[months.length-1].split("-").map(Number); return isoDate(lastTradingDayOfMonth(y, mo - 1)); }
    return m.next_fire || fromStr;
  }
  if (m.type === "recurring_monthly" && m.trigger === "1st_of_month") {
    const months = m.months || [];
    for (const ym of months) {
      const d = ym + "-01";
      if (cmp(d) >= fromStr) return d;
    }
    if (months.length) return months[months.length-1] + "-01";
    return m.next_fire || fromStr;
  }
  // recurring_quarterly + anything else: use stored next_fire
  return m.next_fire || m.trigger || fromStr;
}

/* a one-time date milestone that has been actioned is finished */
function isMilestoneDone(m) {
  return m.type === "date" && !!m.last_actioned;
}

/* effective next fire: respects snooze, and advances past an actioned occurrence.
   Returns null when a one-time milestone is finished. */
function effectiveFire(m, fromStr) {
  if (isMilestoneDone(m)) return null;
  // search from today, or the day after the last actioned occurrence (whichever is later)
  let from = fromStr;
  if (m.last_actioned) {
    const d = parseISO(m.last_actioned); d.setDate(d.getDate() + 1);
    const after = isoDate(d);
    if (after > from) from = after;
  }
  const base = getNextFire(m, from);
  if (m.snooze_until && m.snooze_until > base) return m.snooze_until;
  return base;
}

/* mark a milestone actioned for its current occurrence and advance it */
function advanceMilestone(m, occurrence) {
  const occ = occurrence || todayStr();
  const next = { ...m, last_actioned: occ, snooze_until: undefined };
  if (m.type === "recurring_quarterly") {
    const d = parseISO(occ); d.setMonth(d.getMonth() + 3);
    next.next_fire = isoDate(d);
  }
  return next;
}

/* ============================================================
   COACH MESSAGE — static rules, evaluated in order (Module 3)

function coachMessage(ctx) {
  const { type, energy, waterHit, estrodot, workoutLogged, hour, personalHigh } = ctx;
  if (estrodot && energy <= 2)
    return "Low energy is expected during the Estrodot adjustment window. This is physiological, not motivational.";
  if (type === "HIGH" && !workoutLogged && hour > 17)
    return "HIGH week. One 15-minute session counts as a session. Don't compare this week's volume to a LOW week.";
  if (type === "HIGH" && workoutLogged)
    return "Session logged in a HIGH week. That's the adjusted target met. Frozen meals cover protein for the rest of the week.";
  if (!waterHit && hour > 14)
    return "3L minimum not yet hit. Dehydration amplifies fatigue — physiology, not willpower.";
  if (type === "LOW" && workoutLogged)
    return "LOW week with a session logged. This is the catch-up window — use it.";
  if (type === "MEDIUM" && energy <= 2)
    return "Energy at 2 on a MEDIUM week. One shorter session is the realistic target. Life volume counts.";
  if (type === "LOW" && energy >= 4 && !workoutLogged)
    return "Energy available, LOW week. This is the week to push volume.";
  // Personal HIGH window within 7 days overrides a quiet work week (item 6).
  if (personalHigh)
    return `Personal HIGH window approaching (${personalHigh.range}: ${personalHigh.labels}). This overrides the ${personalHigh.workType} work week — plan capacity as HIGH, not push.`;
  return "Log energy and water to get a read on today.";
}

/* empty daily log, with defaults pre-filled for the given week type */
function emptyLog(date, type) {
  return {
    date,
    energy: type === "HIGH" ? 2 : type === "MEDIUM" ? 3 : 4,
    water_hit: false,
    elvanse_taken: true,
    estrodot_on: true,
    sunlight: "",
    workout: { exercises: [], life_volume: [], total_kg: 0 },
    diet: { protein_estimate_g: 0, friction_hit: false, friction_type: null },
    work: { stress_felt: type === "HIGH" ? 4 : type === "MEDIUM" ? 3 : 2, note: "" },
    wins: []
  };
}
function logVolume(log) {
  if (!log || !log.workout) return 0;
  const w = (log.workout.exercises || []).reduce((s,e)=> s + (e.volume_kg||0), 0);
  const l = (log.workout.life_volume || []).reduce((s,e)=> s + (e.volume_kg||0), 0);
  return w + l;
}
function hasWorkout(log) {
  return !!log && !!log.workout && (log.workout.exercises || []).some(e => (e.reps||0) > 0);
}

/* append one set {weight,reps} to an exercise in a day log; returns a new log */
function appendSet(log, name, set) {
  const l = JSON.parse(JSON.stringify(log));
  l.workout = l.workout || { exercises: [], life_volume: [], total_kg: 0 };
  l.workout.exercises = l.workout.exercises || [];
  let ex = l.workout.exercises.find(e => e.name === name);
  if (!ex) { ex = { name, sets: [], reps: 0, volume_kg: 0 }; l.workout.exercises.push(ex); }
  if (!Array.isArray(ex.sets) || !ex.sets.length) {
    ex.sets = ex.reps ? [{ weight: ex.reps ? Math.round((ex.volume_kg||0)/ex.reps) : 0, reps: ex.reps }] : [];
  }
  ex.sets.push({ weight: set.weight, reps: set.reps });
  ex.reps = ex.sets.reduce((a,s)=> a + (s.reps||0), 0);
  ex.volume_kg = Math.round(ex.sets.reduce((a,s)=> a + (s.weight||0)*(s.reps||0), 0));
  const exVol = l.workout.exercises.reduce((a,e)=> a + (e.volume_kg||0), 0);
  const lifeVol = (l.workout.life_volume||[]).reduce((a,x)=> a + (x.volume_kg||0), 0);
  l.workout.total_kg = exVol + lifeVol;
  return l;
}

// Streak milestone tiers (item 4). 3/7/14/30 are the required moments; the
// larger ones extend the same layer for longevity. These reuse the existing
// reward/confetti/haptics moment — just bigger — they are not a new type.
const STREAK_MILESTONES = [3, 7, 14, 21, 30, 50, 75, 100];
function milestoneSub(n) {
  const map = { 3:"Three days. The habit is forming.", 7:"A full week logged.",
    14:"Two weeks consistent.", 21:"Three weeks in.", 30:"Thirty days. This is a system now.",
    50:"Fifty days logged.", 75:"Seventy-five days.", 100:"One hundred days." };
  return map[n] || `${n} days logged.`;
}

/* one rotating, data-derived insight for the Today tab (works from day one) */
function buildInsight(logs, today, settings) {
  try {
    const all = Object.values(logs).filter(l => l && l.date);
    if (!all.length) return null;
    const month = today.slice(0,7);
    const monthLogs = all.filter(l => l.date.slice(0,7) === month);
    const cands = [];

    const withVol = all.filter(l => logVolume(l) > 0);
    if (withVol.length) {
      const top = withVol.reduce((a,b)=> logVolume(b) > logVolume(a) ? b : a);
      cands.push(`Top session so far: ${parseISO(top.date).toLocaleDateString("en-GB",{weekday:"long"})}, ${Math.round(logVolume(top))}kg.`);
    }
    const wHit = all.filter(l => l.water_hit), wMiss = all.filter(l => !l.water_hit);
    if (wHit.length && wMiss.length) {
      const a = wHit.reduce((s,l)=>s+(l.energy||0),0)/wHit.length;
      const b = wMiss.reduce((s,l)=>s+(l.energy||0),0)/wMiss.length;
      if (Math.abs(a-b) >= 0.3) cands.push(`Water-hit days average ${a.toFixed(1)}/5 energy vs ${b.toFixed(1)} without. Hydration is doing work.`);
    }
    const out = all.filter(l => l.sunlight === "outdoors" && logVolume(l) > 0);
    const ind = all.filter(l => l.sunlight === "indoors" && logVolume(l) > 0);
    if (out.length && ind.length) {
      const ao = out.reduce((s,l)=>s+logVolume(l),0)/out.length;
      const ai = ind.reduce((s,l)=>s+logVolume(l),0)/ind.length;
      if (ao > ai) cands.push(`Outdoor-light days average ${Math.round(ao)}kg vs ${Math.round(ai)}kg indoors.`);
    }
    if (monthLogs.length) {
      const sessions = monthLogs.filter(hasWorkout).length;
      cands.push(`${monthLogs.length} days logged this month, ${sessions} with a session. Consistency compounds.`);
      const pro = monthLogs.reduce((s,l)=>s+(l.diet?.protein_estimate_g||0),0);
      if (pro > 0) cands.push(`Protein logged this month: ${pro}g across ${monthLogs.length} days.`);
    }
    if (!cands.length) return null;
    // rotate daily so the screen stays fresh
    const doy = Math.floor((parseISO(today) - new Date(parseISO(today).getFullYear(),0,0)) / 86400000);
    return cands[doy % cands.length];
  } catch (e) { return null; }
}

function seedIfNeeded() {
  const fresh = !store.get("gc_seeded");
  if (fresh) {
    if (!store.get("gc_settings")) store.set("gc_settings", DEFAULT_SETTINGS);
    SEED_LOGS.forEach(l => store.set("log_" + l.date, l));
    DEFAULT_MILESTONES.forEach(m => store.set("milestone_" + m.id, m));
    // Wins seed attaches to the current day's log so Patterns can query it.
    const wd = SEED_WINS.date;
    if (!store.get("log_" + wd)) {
      const wk = effectiveWeekFor(wd, DEFAULT_CALENDAR, SEED_EVENTS);
      const base = emptyLog(wd, wk.type);
      base.wins = SEED_WINS.wins.map((w, i) => ({
        id: "seed_" + i, text: w.text, category: w.category,
        ts: `${wd}T08:${String(i).padStart(2, "0")}:00`, source: "seed"
      }));
      store.set("log_" + wd, base);
    }
    store.set("gc_seeded", true);
  }
  // Non-destructive migration for installs from earlier builds (PRs #1-7):
  // add the new keys without touching existing user data.
  if (store.get("gc_events") == null) store.set("gc_events", SEED_EVENTS);
  const s = store.get("gc_settings");
  if (s) {
    let changed = false;
    if (!s.focusOptions)    { s.focusOptions = FOCUS_OPTIONS.slice(); changed = true; }
    if (!s.winCategories)   { s.winCategories = WIN_CATEGORIES.slice(); changed = true; }
    if (!s.lastWinCategory) { s.lastWinCategory = "General"; changed = true; }
    if (changed) store.set("gc_settings", s);
  }
}

function loadAllLogs() {
  const out = {};
  store.keys().filter(k => k.startsWith("log_")).forEach(k => {
    const l = store.get(k); if (l && l.date) out[l.date] = l;
  });
  return out;
}
function loadMilestones() {
  return store.keys().filter(k => k.startsWith("milestone_")).map(k => store.get(k)).filter(Boolean);
}
/* personal events (item 6) — own top-level key, kept apart from the work calendar */
function loadEvents() {
  return (store.get("gc_events", []) || []).slice().sort((a, b) => a.date.localeCompare(b.date));
}
function loadAlertLogs() {
  return store.keys().filter(k => k.startsWith("alert_log_")).map(k => store.get(k)).filter(Boolean)
    .sort((a,b)=> (b.timestamp||"").localeCompare(a.timestamp||""));
}
/* one combined dump of everything for export/import */
function buildExportDump() {
  return {
    gc_settings: store.get("gc_settings"),
    gc_events: store.get("gc_events", []),
    logs: store.keys().filter(k=>k.startsWith("log_")).reduce((o,k)=>{ o[k]=store.get(k); return o; }, {}),
    milestones: loadMilestones(),
    alert_logs: store.keys().filter(k=>k.startsWith("alert_log_")).reduce((o,k)=>{ o[k]=store.get(k); return o; }, {})
  };
}
/* reorder an object's keys (used to move exercises in the volume map) */
function reorderKeys(obj, name, dir) {
  const keys = Object.keys(obj);
  const i = keys.indexOf(name);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= keys.length) return obj;
  keys.splice(j, 0, keys.splice(i, 1)[0]);
  const out = {}; keys.forEach(k => { out[k] = obj[k]; }); return out;
}

function ProgressBar({ label, value, target, unit, color, done }) {

function Segment({ options, value, onChange, variant }) {

}
const yesNo = [{label:"YES",value:true},{label:"NO",value:false}];
const energyOpts = [1,2,3,4,5].map(n => ({label:String(n),value:n}));

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch (e) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.opacity="0";
      document.body.appendChild(ta); ta.select(); document.execCommand("copy");
      document.body.removeChild(ta); return true;
    } catch (e2) { return false; }
  }
}

/* ---- dopamine layer: haptics, count-up, rings, streak, reward ---- */
function haptic(pattern) {
  try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
}

function useCountUp(target, dur) {
  const [v, setV] = useState(target || 0);
  const from = useRef(target || 0);
  useEffect(() => {
    const start = from.current;
    const end = target || 0;
    if (start === end) { setV(end); return; }
    let raf, t0;
    const step = (t) => {
      if (!t0) t0 = t;
      const p = Math.min(1, (t - t0) / (dur || 650));
      const e = 1 - Math.pow(1 - p, 3);
      setV(start + (end - start) * e);
      if (p < 1) raf = requestAnimationFrame(step);
      else from.current = end;
    };
    raf = requestAnimationFrame(step);
    return () => { if (raf) cancelAnimationFrame(raf); };
  }, [target, dur]);
  return v;
}

function Ring({ label, value, target, unit, color, done }) {
  const pct = done != null ? (done ? 1 : 0) : (target > 0 ? Math.min(1, value / target) : 0);
  const complete = pct >= 1;
  const shown = useCountUp(done != null ? 0 : (value || 0));
  const R = 44, C = 2 * Math.PI * R;
  const off = C * (1 - pct);
  return (
    <div className={"ring" + (complete ? " complete" : "")}>
      <svg width="104" height="104" viewBox="0 0 104 104">
        <circle className="ring-bg" cx="52" cy="52" r={R} />
        <circle className="ring-fg" cx="52" cy="52" r={R}
          style={{ stroke: color, color: color, strokeDasharray: C, strokeDashoffset: off }} />
      </svg>
      <div className="ring-center">
        <div className="ring-num" style={complete ? { color } : null}>
          {done != null ? (done ? "✓" : "·") : Math.round(shown)}
        </div>
        <div className="ring-lab">{label}</div>
        {done == null && <div className="ring-sub">of {Math.round(target)}{unit || ""}</div>}
      </div>
    </div>
  );
}

/* consecutive logged days ending today (or yesterday if today not yet logged) */
function dayCounts(log) {
  return !!log && (hasWorkout(log) || log.water_hit || log.focus_done || getWins(log).length > 0 || (log.diet && log.diet.protein_estimate_g > 0));
}
function computeStreak(logs, today) {
  let streak = 0;
  let d = parseISO(today);
  if (!dayCounts(logs[today])) d.setDate(d.getDate() - 1);
  while (dayCounts(logs[isoDate(d)])) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

const CONFETTI_COLORS = ["#4dffa0", "#5cb6ff", "#c792ff", "#ffce5c", "#ff7ac6", "#42e8e0"];
/* The daily reward moment. `big` is the streak-milestone variant (item 4):
   the same confetti/haptics layer, scaled up and held a little longer. */
function Reward({ title, sub, big, icon, onDone }) {
  const pieces = useMemo(() => Array.from({ length: big ? 54 : 28 }, () => ({
    left: Math.random() * 100,
    bg: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
    delay: Math.random() * (big ? 0.4 : 0.25),
    dur: 1.1 + Math.random() * (big ? 1.3 : 0.9),
    rot: Math.random() * 360
  })), []);
  useEffect(() => {
    haptic(big ? [18, 50, 22, 50, 40] : [14, 40, 22]);
    const t = setTimeout(() => onDone && onDone(), big ? 2600 : 1500);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className={"reward" + (big ? " big" : "")} onClick={() => onDone && onDone()}>
      {pieces.map((p, i) => (
        <span key={i} className="confetti" style={{
          left: p.left + "%", background: p.bg,
          animationDuration: p.dur + "s", animationDelay: p.delay + "s",
          transform: `rotate(${p.rot}deg)`
        }} />
      ))}
      <div className="reward-card">
        <div className="checkmark">{icon || "✓"}</div>
        <div className="reward-title">{title}</div>
        {sub && <div className="reward-sub">{sub}</div>}
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [tab, setTab] = useState("today");
  // merge defaults so keys added in later builds (focusOptions, winCategories…) exist
  const [settings, setSettings] = useState(() => ({ ...DEFAULT_SETTINGS, ...store.get("gc_settings", {}) }));
  const [logs, setLogs] = useState(() => loadAllLogs());
  const [milestones, setMilestones] = useState(() => loadMilestones());
  const [events, setEvents] = useState(() => loadEvents());
  const [alertLogs, setAlertLogs] = useState(() => loadAlertLogs());
  const [alertOpen, setAlertOpen] = useState(null); // {milestone, auto}
  const [reward, setReward] = useState(null); // {title, sub}
  const [milestoneReward, setMilestoneReward] = useState(null); // larger streak moment
  const celebrate = useCallback((r) => setReward(r || { title: "Done" }), []);
  const [showIntro, setShowIntro] = useState(() => !store.get("gc_settings", DEFAULT_SETTINGS).notifAsked);
  const today = todayStr();
  // effective week type = max(work, life) — drives badge, targets, nav colour, coach
  const week = effectiveWeekFor(today, settings.stressCalendar, events);
  const timers = useRef([]);

  const activeColor = week.type === "HIGH" ? "var(--high)" : week.type === "MEDIUM" ? "var(--medium)" : "var(--low)";

  /* persistence helpers shared with tabs */
  const saveSettings = useCallback((next) => { setSettings(next); store.set("gc_settings", next); }, []);
  const saveEvents = useCallback((next) => {
    const sorted = next.slice().sort((a, b) => a.date.localeCompare(b.date));
    store.set("gc_events", sorted); setEvents(sorted);
  }, []);
  const saveLog = useCallback((log) => {
    store.set("log_" + log.date, log);
    setLogs(prev => ({ ...prev, [log.date]: log }));
  }, []);
  const saveMilestone = useCallback((m) => {
    store.set("milestone_" + m.id, m);
    setMilestones(loadMilestones());
  }, []);
  const deleteMilestone = useCallback((id) => {
    store.del("milestone_" + id); setMilestones(loadMilestones());
  }, []);
  const recordAlert = useCallback((rec) => {
    store.set(`alert_log_${rec.id}_${Date.now()}`, rec);
    setAlertLogs(loadAlertLogs());
  }, []);

  const todayLog = logs[today] || emptyLog(today, week.type);

  /* ---- service worker registration + notification deep-link wiring ---- */
  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(()=>{});
      navigator.serviceWorker.addEventListener("message", (ev) => {
        if (ev.data && ev.data.type === "NOTIFICATION_CLICK") {
          const m = loadMilestones().find(x => x.id === ev.data.id);
          if (m) { setTab("alerts"); setAlertOpen({ milestone: m }); }
        }
      });
    }
    // deep-link from a cold open: /?alert=<id>
    const params = new URLSearchParams(location.search);
    const aid = params.get("alert");
    if (aid) {
      const m = loadMilestones().find(x => x.id === aid);
      if (m) { setTab("alerts"); setAlertOpen({ milestone: m }); }
      history.replaceState({}, "", location.pathname);
    }
  }, []);

  /* ---- client-side scheduling: re-arm timers on open (Module 1) ----
     LIMITATION: setTimeout only fires while the PWA is open/backgrounded.
     True closed-app push needs a backend (phase 2). We recalculate every open. */
  useEffect(() => {
    timers.current.forEach(t => clearTimeout(t));
    timers.current = [];
    const now = Date.now();
    const MAX = 24 * 24 * 3600 * 1000; // setTimeout safe ceiling (~24 days)
    milestones.forEach(m => {
      const fire = effectiveFire(m, today);
      if (!fire) return;
      const fireMs = parseISO(fire).getTime() + 9 * 3600 * 1000; // 09:00 local
      const delay = fireMs - now;
      if (delay > 0 && delay < MAX) {
        const t = setTimeout(() => {
          if (navigator.serviceWorker && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: "SHOW_NOTIFICATION",
              payload: { id: m.id, project: m.project, title: m.name, body: m.action.slice(0, 120) }
            });
          }
          setAlertOpen({ milestone: m, auto: true });
        }, delay);
        timers.current.push(t);
      }
    });
    return () => { timers.current.forEach(t => clearTimeout(t)); };
  }, [milestones, today]);

  /* upcoming milestones sorted by next fire (finished one-time alerts drop off) */
  const upcoming = useMemo(() => {
    return milestones
      .map(m => ({ m, fire: effectiveFire(m, today) }))
      .filter(x => x.fire)
      .map(x => ({ ...x, days: daysBetween(today, x.fire) }))
      .sort((a,b) => a.fire.localeCompare(b.fire));
  }, [milestones, today]);

  const nextAlert = upcoming.find(u => u.days >= 0) || upcoming[0];
  const pending7 = upcoming.filter(u => u.days >= 0 && u.days <= 7).length;

  /* ---- upcoming personal events + nearest personal-HIGH cluster (item 6) ---- */
  const upcomingEvents = useMemo(() =>
    events.filter(e => e.date >= today).map(e => ({ ...e, days: daysBetween(today, e.date) }))
  , [events, today]);
  const nextCluster = useMemo(() => {
    const cs = heavyClusters(events)
      .map(c => ({ ...c, days: daysBetween(today, c.start) }))
      .filter(c => c.end >= today)
      .sort((a, b) => a.start.localeCompare(b.start));
    return cs[0] || null;
  }, [events, today]);

  /* ---- streak milestone celebrations (item 4) ----
     Reuses the existing reward layer — a larger moment on top of the per-day
     one, never replacing it. Fires only on the day the milestone is completed
     (today logged), so it doesn't re-fire the next morning when the streak
     carries over. Once per (milestone, date reached); a reset and re-climb
     celebrates again. */
  const streak = useMemo(() => computeStreak(logs, today), [logs, today]);
  const countedToday = dayCounts(logs[today]);
  useEffect(() => {
    if (!countedToday || !STREAK_MILESTONES.includes(streak)) return;
    const seen = store.get("gc_milestone_seen", {});
    if (seen[streak] === today) return;
    seen[streak] = today; store.set("gc_milestone_seen", seen);
    // delay so it layers after the per-day reward rather than clobbering it
    const t = setTimeout(() => setMilestoneReward({ value: streak, sub: milestoneSub(streak) }), 1500);
    return () => clearTimeout(t);
  }, [streak, countedToday, today]);

  /* ---- notification permission flow ---- */
  const requestPerms = async () => {
    let perm = "default";
    try { if ("Notification" in window) perm = await Notification.requestPermission(); }
    catch (e) { perm = "default"; }
    saveSettings({ ...settings, notifPermission: perm, notifAsked: true });
    setShowIntro(false);
  };
  const dismissIntro = () => { saveSettings({ ...settings, notifAsked: true }); setShowIntro(false); };

  const ctxBundle = { settings, week, today, logs, milestones, events, alertLogs, saveSettings, saveLog, saveMilestone, deleteMilestone, saveEvents, recordAlert, setTab, setAlertOpen, celebrate };

  return (
    <div className="app" data-skin={settings.theme || "hotpink"} style={{ "--active": activeColor }}>
      <div className="content">
        {showIntro && (
          <IntroCard onEnable={requestPerms} onSkip={dismissIntro} />
        )}
        {!showIntro && settings.notifPermission === "denied" && (
          <div className="banner warn">Notifications off — trading alerts won't fire. Enable in browser settings.</div>
        )}

        {tab === "today" &&    <TodayTab {...ctxBundle} todayLog={todayLog} nextAlert={nextAlert} upcomingEvents={upcomingEvents} nextCluster={nextCluster} />}

/* Fast single-set logger — log to today's workout without leaving Today */
function QuickSetSheet({ todayLog, settings, saveLog, logs, celebrate, onClose }) {
  // chips ordered by how often you log each exercise (most-used first)
  const usage = {};
  Object.values(logs || {}).forEach(l => (l.workout?.exercises || []).forEach(e => { usage[e.name] = (usage[e.name]||0) + 1; }));
  const names = Object.keys(settings.volumeMap).sort((a,b) => (usage[b]||0) - (usage[a]||0));
  const defW = (n) => n === "Push-ups" ? Math.round((settings.bodyWeight||0)*0.5) : (settings.volumeMap[n] != null ? settings.volumeMap[n] : 0);
  const [name, setName] = useState(names[0] || "");
  const [weight, setWeight] = useState(String(defW(names[0] || "")));
  const [reps, setReps] = useState("");
  const [added, setAdded] = useState(0);

  const pick = (n) => { haptic(8); setName(n); setWeight(String(defW(n))); };
  const add = () => {
    const w = Number(weight)||0, r = Number(reps)||0;
    if (!name || r <= 0) return;
    saveLog(appendSet(todayLog, name, { weight: w, reps: r }));
    haptic([10,30,10]); setAdded(added + 1); setReps("");
  };
  const done = () => {
    if (added > 0) celebrate && celebrate({ title: `${added} set${added>1?"s":""} logged`, sub: name });
    onClose();
  };

  return (
    <div className="sheet" onClick={done}>
      <div className="sheet-inner" onClick={e=>e.stopPropagation()}>
        <div className="row between"><h2>Quick set</h2><button className="ghost sm" onClick={done}>Done</button></div>
        <div className="row wrap mt12" style={{gap:6}}>
          {names.map(n => (
            <button key={n} className={"chip" + (n===name ? " on" : "")} onClick={()=>pick(n)}>{n}</button>
          ))}
        </div>
        <div className="row mt12" style={{gap:8, alignItems:"flex-end"}}>
          <label className="field grow">Weight kg
            <input inputMode="decimal" value={weight} onChange={e=>setWeight(e.target.value.replace(/[^0-9.]/g,""))} />
          </label>
          <label className="field grow">Reps
            <input inputMode="numeric" value={reps} onChange={e=>setReps(e.target.value.replace(/[^0-9]/g,""))} />
          </label>
        </div>
        <button className="primary block mt12" disabled={!reps} onClick={add}>
          {added > 0 ? `Add set · ${added} logged` : "Add set"}
        </button>
        <p className="tiny muted mt8" style={{textAlign:"center"}}>Adds to today's workout. Add another or tap Done.</p>
      </div>
    </div>
  );
}

/* Today's focus — pick a quick win from a list or type your own, then bank it.
   The option list is editable in Settings (item 1). Completing a focus also
   drops a win (item 5), deduped against a manual win of the same text. */
function FocusCard({ todayLog, saveLog, celebrate, options }) {
  const [picking, setPicking] = useState(false);
  const [custom, setCustom] = useState("");
  const opts = options && options.length ? options : FOCUS_OPTIONS;
  const choose = (text) => { haptic(8); saveLog({ ...todayLog, focus: text, focus_done: false }); setPicking(false); setCustom(""); };
  const toggleDone = () => {
    const done = !todayLog.focus_done;
    let wins = getWins(todayLog);
    if (done) {
      if (!wins.some(w => normWin(w.text) === normWin(todayLog.focus)))
        wins = [...wins, makeWin(todayLog.focus, "General", "focus")]; // category General; inference kept simple
    } else {
      wins = wins.filter(w => !(w.source === "focus" && normWin(w.text) === normWin(todayLog.focus)));
    }
    saveLog({ ...todayLog, focus_done: done, wins });
    if (done) { haptic([12,40,12]); celebrate && celebrate({ title: "Quick win", sub: todayLog.focus }); }
  };

  if (picking || !todayLog.focus) {
    return (
      <div className="card focus-pick">
        <div className="row between">
          <h3>Today's focus</h3>
          {todayLog.focus && <button className="ghost sm" onClick={()=>setPicking(false)}>Cancel</button>}
        </div>
        <p className="tiny muted mt8">Pick one quick win, or write your own.</p>
        <div className="col mt12" style={{gap:8}}>
          {opts.map(o => (
            <button key={o} className="focus-opt" onClick={()=>choose(o)}>{o}</button>
          ))}
        </div>
        <div className="row mt12" style={{gap:8}}>
          <input className="grow" placeholder="or type your own" value={custom} onChange={e=>setCustom(e.target.value)} />
          <button className="sm" disabled={!custom.trim()} onClick={()=>choose(custom.trim())}>Set</button>
        </div>
      </div>
    );
  }
  return (
    <div className={"card focus" + (todayLog.focus_done ? " done" : "")}>
      <div className="row between">
        <h3>Today's focus</h3>
        <button className="ghost sm" onClick={()=>setPicking(true)}>Change</button>
      </div>
      <p className="mt8 focus-text">{todayLog.focus}</p>
      <button className={"block mt12 " + (todayLog.focus_done ? "" : "primary")} onClick={toggleDone}>
        {todayLog.focus_done ? "✓ Done — tap to undo" : "Mark done"}
      </button>
    </div>
  );
}

/* Wins (item 5) — completed reality, captured + accumulated on Today.
   Count is large; the day's wins are listed newest-first; quick-add is ≤3 taps
   (type, optionally pick a chip, Add). Feeds the EXISTING reward layer: the
   first win of the day fires the per-day moment, no new celebration type.
   The input is deliberately NOT auto-focused — popping the keyboard on a
   dashboard-first screen would fight the "context before input" rule. */
function WinsCard({ todayLog, saveLog, settings, saveSettings, celebrate, onHistory }) {
  const cats = (settings.winCategories && settings.winCategories.length) ? settings.winCategories : WIN_CATEGORIES;
  const [text, setText] = useState("");
  const [cat, setCat] = useState(() =>
    settings.lastWinCategory && cats.includes(settings.lastWinCategory) ? settings.lastWinCategory
      : (cats.includes("General") ? "General" : cats[0]));
  const wins = getWins(todayLog);
  const shown = useCountUp(wins.length);
  const dayList = wins.slice().reverse(); // newest first

  const add = () => {
    const t = text.trim();
    if (!t) return;
    const firstOfDay = wins.length === 0;
    saveLog({ ...todayLog, wins: [...wins, makeWin(t, cat, "manual")] });
    if (settings.lastWinCategory !== cat) saveSettings({ ...settings, lastWinCategory: cat });
    setText(""); haptic([10,30,10]);
    if (firstOfDay) celebrate && celebrate({ title: "Win logged", sub: cat });
  };
  const remove = (id) => { haptic(8); saveLog({ ...todayLog, wins: wins.filter(w => w.id !== id) }); };

  return (
    <div className="card wins">
      <div className="row between">
        <h3>Wins</h3>
        <button className="ghost sm" onClick={()=>{ haptic(6); onHistory(); }}>History</button>
      </div>
      <button className="wins-count" onClick={()=>{ haptic(6); onHistory(); }}>
        <span className="bignum grad mono">{Math.round(shown)}</span>
        <span className="tiny muted">today · tap for history</span>
      </button>
      <div className="row mt12" style={{gap:8}}>
        <input className="grow" placeholder="what got done" value={text}
          onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if (e.key === "Enter") add(); }} />
        <button className="sm primary" disabled={!text.trim()} onClick={add}>Add</button>
      </div>
      <div className="row wrap mt8" style={{gap:6}}>
        {cats.map(c => (
          <button key={c} className={"chip" + (c===cat ? " on" : "")} onClick={()=>{ haptic(6); setCat(c); }}>{c}</button>
        ))}
      </div>
      {dayList.length > 0 && (
        <div className="col mt12" style={{gap:6}}>
          {dayList.map(w => (
            <div key={w.id} className="win-item">
              <span className="win-cat">{w.category}</span>
              <span className="small grow">{w.text}</span>
              <button className="sm ghost" style={{minHeight:28,padding:"0 8px"}} onClick={()=>remove(w.id)}>✗</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* Rotating "today's experiment" (item 3). One surfaces per day; marking it
   tried records it on the day log for Patterns correlation. */
function ExperimentCard({ todayLog, saveLog }) {
  const exp = experimentFor(todayLog.date);
  if (!exp) return null;
  const rec = todayLog.experiment && todayLog.experiment.id === exp.id ? todayLog.experiment : null;
  const tried = !!(rec && rec.tried);
  const toggle = () => {
    haptic(tried ? 8 : [10,30,10]);
    saveLog({ ...todayLog, experiment: { id: exp.id, text: exp.text, tried: !tried } });
  };
  return (
    <div className={"card experiment" + (tried ? " on" : "")}>
      <div className="row between">
        <h3>Today's experiment</h3>
        {tried && <span className="tiny" style={{color:"var(--accent-3)",fontWeight:700}}>tried</span>}
      </div>
      <p className="mt8" style={{fontWeight:650}}>{exp.text}</p>
      <button className={"block mt12 " + (tried ? "" : "primary")} onClick={toggle}>
        {tried ? "✓ Tried — tap to undo" : "Mark tried"}
      </button>
    </div>
  );
}
